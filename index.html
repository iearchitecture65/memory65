<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Lens</title>
    
    <!-- ฟอนต์ Kanit สไตล์มินิมอล ไม่มีหัว -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Kanit', sans-serif; 
            background: #fff;
            color: #000;
            -webkit-tap-highlight-color: transparent;
        }
        
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .preview-box {
            width: 280px;
            aspect-ratio: 16 / 9;
            margin-bottom: 40px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.1);
            background: #f9f9f9;
        }

        .preview-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.9; }

        .btn-start {
            background: #000; color: #fff; border: none;
            padding: 15px 50px; font-size: 1.1rem; 
            border-radius: 50px; cursor: pointer; font-weight: 600;
            font-family: 'Kanit', sans-serif;
            transition: transform 0.2s, background 0.3s;
        }
        
        .btn-start:disabled { background: #eee; color: #aaa; cursor: wait; }
        .btn-start:active { transform: scale(0.95); }

        #camera-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            background: #fff;
        }

        #webcam { width: 100%; height: 100%; object-fit: cover; }

        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw; aspect-ratio: 16 / 10;
            max-width: 350px;
            border: 2px solid #000;
            border-radius: 12px;
            box-shadow: 0 0 0 1000px rgba(255,255,255,0.7);
            z-index: 5;
        }

        .scan-line {
            position: absolute;
            top: 0; width: 100%; height: 3px;
            background: #000;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            animation: scan 2.5s ease-in-out infinite;
        }

        @keyframes scan { 0%, 100% { top: 5%; } 50% { top: 95%; } }

        #play-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
            color: #000;
        }

        #video-player {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            z-index: 1500;
            object-fit: contain;
            background: #000;
        }

        #fullscreen-hint {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.95rem;
            font-weight: 600;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            border: 2px solid #000;
            cursor: pointer;
            font-family: 'Kanit', sans-serif;
            transition: top 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #fullscreen-hint.show {
            top: 40px;
        }

        .status-msg {
            position: absolute;
            bottom: 100px;
            width: 100%;
            text-align: center;
            font-size: 0.9rem;
            color: #000;
            letter-spacing: 1px;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="preview-box">
            <img id="target-img" src="memory-picture.JPG">
        </div>
        <button class="btn-start" id="start-btn" disabled>กำลังโหลด...</button>
    </div>

    <div id="fullscreen-hint">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        แตะเพื่อดูแบบเต็มจอ
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="scan-frame"><div class="scan-line"></div></div>
        <div class="status-msg">วางรูปถ่ายให้พอดีกับกรอบ</div>
    </div>

    <div id="play-overlay">
        <div style="width:60px;height:60px;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:15px">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span style="letter-spacing:1px; font-size:1.1rem; font-weight:600">พบความทรงจำแล้ว</span>
    </div>

    <video id="video-player" src="Video.mp4" playsinline loop controls></video>

    <script>
        const targetImg = document.getElementById('target-img');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const cameraContainer = document.getElementById('camera-container');
        const webcam = document.getElementById('webcam');
        const videoPlayer = document.getElementById('video-player');
        const playOverlay = document.getElementById('play-overlay');
        const fsHint = document.getElementById('fullscreen-hint');

        let model, targetFeatures;
        let isDetected = false;
        // ปรับ Threshold ให้สูงขึ้นเล็กน้อยเพื่อให้แม่นยำขึ้นเมื่อใช้การ Crop
        const THRESHOLD = 0.62; 

        async function init() {
            try {
                if (!targetImg.complete) await new Promise(r => targetImg.onload = r);
                model = await mobilenet.load({ version: 2, alpha: 1.0 });
                
                // เตรียมภาพเป้าหมาย: ประมวลผลให้ AI จำได้ฉลาดที่สุด
                const targetTensor = tf.tidy(() => {
                    const img = tf.browser.fromPixels(targetImg);
                    return tf.image.resizeBilinear(img, [224, 224]).expandDims(0).toFloat().div(127.5).sub(1);
                });
                
                targetFeatures = model.infer(targetTensor, true);
                targetTensor.dispose();
                
                startBtn.innerText = "เริ่มสแกน";
                startBtn.disabled = false;
            } catch (e) { startBtn.innerText = "ผิดพลาด"; }
        }

        startBtn.onclick = () => {
            overlay.style.opacity = '0';
            setTimeout(async () => {
                overlay.style.display = 'none';
                cameraContainer.style.display = 'block';
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                webcam.srcObject = stream;
                videoPlayer.load();
                requestAnimationFrame(predict);
            }, 500);
        };

        async function predict() {
            if (!isDetected && webcam.readyState === 4) {
                const score = tf.tidy(() => {
                    // ดึงภาพจากเว็บแคม
                    const fullImg = tf.browser.fromPixels(webcam);
                    
                    // คำนวณพื้นที่ที่จะสแกน (ROI) ให้ตรงกับกรอบสีดำกลางจอ
                    // เนื่องจากวิดีโอเป็น object-fit: cover เราจะสกัดภาพจากส่วนกลาง
                    const [h, w] = fullImg.shape;
                    const size = Math.min(h, w) * 0.8;
                    const startH = (h - size) / 2;
                    const startW = (w - size) / 2;
                    
                    const croppedImg = tf.image.cropAndResize(
                        fullImg.expandDims(0).toFloat(),
                        [[startH/h, startW/w, (startH+size)/h, (startW+size)/w]],
                        [0],
                        [224, 224]
                    ).div(127.5).sub(1);

                    const feat = model.infer(croppedImg, true);
                    const a = tf.div(targetFeatures, tf.norm(targetFeatures));
                    const b = tf.div(feat, tf.norm(feat));
                    return tf.sum(tf.mul(a, b)).dataSync()[0];
                });

                if (score > THRESHOLD) {
                    isDetected = true;
                    if (webcam.srcObject) {
                        webcam.srcObject.getTracks().forEach(t => t.stop());
                    }
                    cameraContainer.style.display = 'none';
                    videoPlayer.style.display = 'block';
                    playOverlay.style.display = 'flex';
                }
                setTimeout(() => requestAnimationFrame(predict), 150);
            } else if (!isDetected) requestAnimationFrame(predict);
        }

        playOverlay.onclick = () => {
            playOverlay.style.display = 'none';
            videoPlayer.play();

            setTimeout(() => {
                const isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
                if (!isFS) {
                    fsHint.classList.add('show');
                    setTimeout(() => fsHint.classList.remove('show'), 6000);
                }
            }, 2000);
        };

        fsHint.onclick = () => {
            const el = videoPlayer;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitEnterFullscreen) el.webkitEnterFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            fsHint.classList.remove('show');
        };

        const onFSChange = () => {
            const isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
            if (isFS) fsHint.classList.remove('show');
        };
        document.addEventListener('fullscreenchange', onFSChange);
        document.addEventListener('webkitfullscreenchange', onFSChange);

        init();
    </script>
</body>
</html>
