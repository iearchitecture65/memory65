<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Lens - AI Recognition</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- TensorFlow.js & MobileNet -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        :root {
            --accent-color: #ffffff;
            --bg-gradient: linear-gradient(180deg, #121212 0%, #000000 100%);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Sarabun', sans-serif; 
            background: #000;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* หน้าจอเริ่มต้น */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container { width: 100%; max-width: 400px; }
        h1 { font-weight: 300; letter-spacing: 6px; text-transform: uppercase; font-size: 1.8rem; margin-bottom: 5px; }
        p { font-weight: 300; font-size: 1rem; opacity: 0.6; margin-bottom: 40px; }

        .image-preview {
            width: 220px; height: 220px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            margin: 0 auto 40px;
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }
        
        .image-preview img { 
            width: 100%; height: 100%; 
            object-fit: contain; 
            border-radius: 50%;
        }

        .btn-start {
            background: white; color: black; border: none;
            width: 80%; max-width: 250px;
            padding: 18px 0; font-size: 1rem; 
            /* ปรับระยะห่างตัวอักษรเป็นปกติ */
            letter-spacing: normal; 
            border-radius: 100px; cursor: pointer; font-weight: 600;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }
        .btn-start:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* ส่วนแสดงผลกล้อง */
        #camera-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            background: #000;
        }

        #webcam { width: 100%; height: 100%; object-fit: cover; }

        /* หน้าจอโหลดวิดีโอเมื่อสแกนติด */
        #video-loading {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1500;
            cursor: pointer;
        }

        /* เครื่องเล่นวิดีโอ */
        #video-player {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: auto;
            max-height: 100%;
            display: none;
            z-index: 2000;
            background: #000;
        }

        #scan-ui {
            position: absolute;
            bottom: 50px; width: 100%;
            text-align: center; pointer-events: none;
            z-index: 100;
        }

        .status-badge {
            background: rgba(0,0,0,0.8);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
        }

        .loader-ring {
            width: 30px; height: 30px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        /* คำแนะนำเอียงจอ */
        #landscape-hint {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: #fff;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.8rem;
            z-index: 3000;
            display: none;
            border: 1px solid rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            pointer-events: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="container">
            <h1>Memory Lens</h1>
            <p id="main-desc">กำลังโหลดโมเดล AI...</p>
            <div class="image-preview">
                <img id="target-img" src="picture.png" alt="Target Image">
            </div>
            <button class="btn-start" id="start-btn" disabled>กรุณารอสักครู่</button>
        </div>
    </div>

    <!-- หน้าจอตอนวิดีโอกำลังโหลด -->
    <div id="video-loading">
        <div id="loading-content" style="text-align:center;">
            <div class="loader-ring"></div>
            <p id="loading-text" style="letter-spacing: 2px; font-weight: 300;">กำลังเปิดความทรงจำ...</p>
        </div>
    </div>

    <!-- แถบแนะนำการหมุนจอ -->
    <div id="landscape-hint">🔄 แนะนำให้ดูวิดีโอในแนวนอนเพื่อความชัดเจน</div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="scan-ui">
            <div class="loader-ring"></div>
            <span class="status-badge" id="status-text">🔍 สแกนที่พวงกุญแจของคุณ</span>
        </div>
    </div>

    <!-- วิดีโอหลัก -->
    <video id="video-player" src="Video.mp4" playsinline loop></video>

    <script>
        const targetImg = document.getElementById('target-img');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const cameraContainer = document.getElementById('camera-container');
        const webcam = document.getElementById('webcam');
        const videoPlayer = document.getElementById('video-player');
        const videoLoading = document.getElementById('video-loading');
        const loadingContent = document.getElementById('loading-content');
        const loadingText = document.getElementById('loading-text');
        const landscapeHint = document.getElementById('landscape-hint');

        let model;
        let targetFeatures;
        let isDetected = false;
        let cameraStream = null;
        const SIMILARITY_THRESHOLD = 0.58; 

        async function init() {
            try {
                if (!targetImg.complete) await new Promise(r => targetImg.onload = r);
                model = await mobilenet.load();
                const targetTensor = tf.browser.fromPixels(targetImg);
                targetFeatures = model.infer(targetTensor, true);
                targetTensor.dispose();
                document.getElementById('main-desc').innerText = "พร้อมสแกนความทรงจำแล้ว";
                startBtn.innerText = "เริ่มสแกน";
                startBtn.disabled = false;
            } catch (e) { 
                document.getElementById('main-desc').innerText = "❌ เกิดข้อผิดพลาดในการโหลด";
                console.error(e); 
            }
        }

        startBtn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                openCamera();
            }, 500);
        });

        async function openCamera() {
            cameraContainer.style.display = 'block';
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                webcam.srcObject = cameraStream;
                videoPlayer.load();
                requestAnimationFrame(predictLoop);
            } catch (err) { alert("ไม่สามารถเข้าถึงกล้องได้: " + err.message); }
        }

        async function predictLoop() {
            if (!isDetected && model) {
                try {
                    const similarity = tf.tidy(() => {
                        const webcamTensor = tf.browser.fromPixels(webcam);
                        const webcamFeatures = model.infer(webcamTensor, true);
                        const a = tf.div(targetFeatures, tf.norm(targetFeatures));
                        const b = tf.div(webcamFeatures, tf.norm(webcamFeatures));
                        return tf.sum(tf.mul(a, b)).dataSync()[0];
                    });

                    if (similarity > SIMILARITY_THRESHOLD) {
                        handleDetectionSuccess();
                        return;
                    }
                } catch (e) { }
                setTimeout(() => requestAnimationFrame(predictLoop), 100);
            }
        }

        function handleDetectionSuccess() {
            isDetected = true;
            
            // 1. ปิดกล้องทันทีและซ่อน UI สแกน
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
            cameraContainer.style.display = 'none';
            
            // 2. แสดงหน้าจอโหลด
            videoLoading.style.display = 'flex';
            
            // 3. ตั้งค่าการจัดการคลิกบนหน้าจอโหลด (ในกรณีที่ autoplay ไม่ทำงาน)
            videoLoading.onclick = () => {
                loadingText.innerText = "กำลังเล่นวิดีโอ...";
                videoPlayer.play().then(() => {
                    videoLoading.style.display = 'none';
                    videoPlayer.style.display = 'block';
                }).catch(e => {
                    console.error("Play failed on click:", e);
                });
            };

            // 4. สั่งเล่นวิดีโอ
            const playPromise = videoPlayer.play();

            // 5. เมื่อวิดีโอเริ่มเล่นจริง
            videoPlayer.onplaying = () => {
                videoLoading.style.display = 'none';
                videoPlayer.style.display = 'block';
                checkOrientation();
                window.addEventListener('resize', checkOrientation);
            };

            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Autoplay prevented, waiting for user click.");
                    loadingContent.innerHTML = `
                        <div style="padding: 20px; border: 1px solid white; border-radius: 15px; background: rgba(255,255,255,0.1);">
                            <p style="font-size: 1.2rem; margin-bottom: 10px;">✨ พบความทรงจำแล้ว</p>
                            <p style="font-weight: 300;">แตะที่นี่เพื่อเริ่มเล่นวิดีโอ</p>
                        </div>
                    `;
                });
            }

            // แตะวิดีโอขณะเล่นเพื่อสแกนใหม่
            videoPlayer.onclick = () => location.reload();
        }

        function checkOrientation() {
            const isVideoLandscape = videoPlayer.videoWidth > videoPlayer.videoHeight;
            const isScreenPortrait = window.innerHeight > window.innerWidth;
            if (isVideoLandscape && isScreenPortrait) {
                landscapeHint.style.display = 'block';
            } else {
                landscapeHint.style.display = 'none';
            }
        }

        init();
    </script>
</body>
</html>
