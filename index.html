<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Lens - AI Recognition</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- TensorFlow.js & MobileNet for Image Similarity -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        :root {
            --accent-color: #ffffff;
            --bg-gradient: linear-gradient(180deg, #1a1a2e 0%, #000000 100%);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Sarabun', sans-serif; 
            background: #000;
            color: #fff;
        }
        
        /* หน้าจอเริ่มต้น */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.8s ease;
            text-align: center;
            padding: 20px;
        }

        .container { max-width: 320px; }
        h1 { font-weight: 300; letter-spacing: 4px; text-transform: uppercase; font-size: 1.5rem; margin-bottom: 10px; }
        p { font-weight: 300; font-size: 0.9rem; opacity: 0.7; margin-bottom: 30px; }

        .image-preview {
            width: 150px; height: 150px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            margin: 0 auto 30px;
            padding: 10px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
        }
        .image-preview img { width: 100%; height: 100%; object-fit: contain; border-radius: 50%; }

        .btn-start {
            background: white; color: black; border: none;
            padding: 15px 40px; font-size: 0.9rem; letter-spacing: 2px;
            border-radius: 100px; cursor: pointer; font-weight: 600;
            text-transform: uppercase;
        }
        .btn-start:disabled { background: #444; color: #888; cursor: not-allowed; }

        /* ส่วนแสดงผลกล้องและวิดีโอ */
        #camera-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
        }

        #webcam {
            width: 100%; height: 100%; object-fit: cover;
            transform: scaleX(-1);
        }

        #video-player {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90%; max-width: 500px;
            border-radius: 15px;
            display: none;
            box-shadow: 0 0 50px rgba(255,255,255,0.2);
            z-index: 10;
        }

        #scan-ui {
            position: absolute;
            bottom: 40px; width: 100%;
            text-align: center; pointer-events: none;
            z-index: 5;
        }

        .status-badge {
            background: rgba(0,0,0,0.6);
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .loader-ring {
            width: 40px; height: 40px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="container">
            <h1>Memory Lens</h1>
            <p id="main-desc">กำลังโหลดโมเดล AI และรูปภาพ...</p>
            <div class="image-preview">
                <!-- เปลี่ยนมาใช้ไฟล์ภายในเครื่องแทนลิงก์ภายนอก -->
                <img id="target-img" src="pepsiontime.png">
            </div>
            <button class="btn-start" id="start-btn" disabled>กรุณารอสักครู่...</button>
        </div>
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <video id="video-player" src="D_Logo_Reveal_for_Performing_Arts.mp4" loop playsinline></video>

        <div id="scan-ui">
            <div class="loader-ring" id="ui-loader"></div>
            <span class="status-badge" id="status-text">🔍 สแกนที่รูปพวงกุญแจ...</span>
        </div>
    </div>

    <script>
        const targetImg = document.getElementById('target-img');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const mainDesc = document.getElementById('main-desc');
        const cameraContainer = document.getElementById('camera-container');
        const webcam = document.getElementById('webcam');
        const videoPlayer = document.getElementById('video-player');
        const statusText = document.getElementById('status-text');
        const uiLoader = document.getElementById('ui-loader');

        let model;
        let targetFeatures;
        let isVideoPlaying = false;
        const SIMILARITY_THRESHOLD = 0.88;

        function waitForImage(img) {
            return new Promise((resolve, reject) => {
                if (img.complete && img.naturalWidth !== 0) {
                    resolve();
                } else {
                    img.onload = () => resolve();
                    img.onerror = () => reject(new Error("ไม่พบไฟล์รูปภาพ 'pepsiontime.png' ในโฟลเดอร์เดียวกัน"));
                }
            });
        }

        async function init() {
            try {
                await waitForImage(targetImg);
                model = await mobilenet.load();
                
                const targetTensor = tf.browser.fromPixels(targetImg);
                targetFeatures = model.infer(targetTensor, true);
                
                mainDesc.innerText = "ระบบพร้อมทำงานแล้ว";
                startBtn.innerText = "เริ่มต้นสแกน";
                startBtn.disabled = false;
            } catch (e) {
                console.error("Initialization Error:", e);
                mainDesc.innerText = "❌ เกิดข้อผิดพลาด";
                mainDesc.style.color = "#ff4757";
                startBtn.innerText = "โหลดไม่สำเร็จ";
                const errDetail = document.createElement('p');
                errDetail.style.fontSize = "0.7rem";
                errDetail.innerText = e.message;
                overlay.appendChild(errDetail);
            }
        }

        startBtn.addEventListener('click', async () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                cameraContainer.style.display = 'block';
            }, 800);

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, 
                    audio: false 
                });
                webcam.srcObject = stream;
                predict();
            } catch (err) {
                alert("ไม่สามารถเข้าถึงกล้องได้: " + err.message);
            }
        });

        function cosineSimilarity(tensorA, tensorB) {
            return tf.tidy(() => {
                const a = tf.div(tensorA, tf.norm(tensorA));
                const b = tf.div(tensorB, tf.norm(tensorB));
                return tf.sum(tf.mul(a, b)).dataSync()[0];
            });
        }

        async function predict() {
            if (!isVideoPlaying && model) {
                try {
                    const webcamTensor = tf.browser.fromPixels(webcam);
                    const webcamFeatures = model.infer(webcamTensor, true);
                    const similarity = cosineSimilarity(targetFeatures, webcamFeatures);
                    
                    if (similarity > SIMILARITY_THRESHOLD) {
                        showVideo();
                    }
                } catch (e) {
                    console.warn("Prediction frame skipped", e);
                }
            }
            setTimeout(predict, 300);
        }

        function showVideo() {
            isVideoPlaying = true;
            uiLoader.style.display = 'none';
            statusText.innerText = "✨ พบความทรงจำแล้ว!";
            statusText.style.background = "rgba(46, 204, 113, 0.8)";
            
            videoPlayer.style.display = 'block';
            videoPlayer.play().catch(e => console.error("Video play error:", e));
            
            videoPlayer.onclick = () => {
                videoPlayer.pause();
                videoPlayer.style.display = 'none';
                isVideoPlaying = false;
                uiLoader.style.display = 'block';
                statusText.innerText = "🔍 สแกนที่รูปพวงกุญแจ...";
                statusText.style.background = "rgba(0,0,0,0.6)";
            };
        }

        init();
    </script>
</body>
</html>
