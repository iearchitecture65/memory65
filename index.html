<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Lens - AI Recognition</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- TensorFlow.js & MobileNet -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        :root {
            --accent-color: #ffffff;
            --bg-gradient: linear-gradient(180deg, #121212 0%, #000000 100%);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Sarabun', sans-serif; 
            background: #000;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* หน้าจอเริ่มต้น */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container { width: 100%; max-width: 400px; }
        h1 { font-weight: 300; letter-spacing: 6px; text-transform: uppercase; font-size: 1.8rem; margin-bottom: 5px; }
        p { font-weight: 300; font-size: 1rem; opacity: 0.6; margin-bottom: 40px; }

        .image-preview {
            width: 220px; height: 220px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            margin: 0 auto 40px;
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }
        
        .image-preview img { 
            width: 100%; height: 100%; 
            object-fit: contain; 
            border-radius: 50%;
        }

        .btn-start {
            background: white; color: black; border: none;
            width: 80%; max-width: 250px;
            padding: 18px 0; font-size: 1rem; 
            letter-spacing: normal; 
            border-radius: 100px; cursor: pointer; font-weight: 600;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
        }
        .btn-start:disabled { background: #333; color: #666; cursor: not-allowed; }

        /* ส่วนแสดงผลกล้อง */
        #camera-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            background: #000;
        }

        #webcam { width: 100%; height: 100%; object-fit: cover; }

        /* หน้าจอ "แตะเพื่อเล่น" (Overlay หลังจากสแกนติด) */
        #play-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2500;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        #play-overlay p {
            font-weight: 300;
            font-size: 0.85rem; 
            letter-spacing: 1px;
            color: rgba(255,255,255,0.8);
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        /* เครื่องเล่นวิดีโอ */
        #video-player {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100%;
            height: auto;
            max-height: 100%;
            display: none;
            z-index: 2000;
            background: #000;
        }

        #scan-ui {
            position: absolute;
            bottom: 50px; width: 100%;
            text-align: center; pointer-events: none;
            z-index: 100;
        }

        .status-badge {
            background: rgba(0,0,0,0.8);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .loader-ring {
            width: 30px; height: 30px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        /* ปุ่มแนะนำเต็มจอ (ปรับความทึบให้เห็นชัดขึ้นเหนือวิดีโอ) */
        #fullscreen-hint {
            position: fixed;
            top: 20px; left: 50%;
            transform: translateX(-50%);
            /* ปรับสีให้ทึบขึ้นเพื่อสู้กับแสงวิดีโอ (Black 80%) */
            background: rgba(20, 20, 20, 0.85); 
            color: #ffffff;
            padding: 12px 28px;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 400;
            z-index: 3000;
            display: none;
            /* ขอบปุ่มให้ดูมีมิติ */
            border: 1px solid rgba(255, 255, 255, 0.25); 
            backdrop-filter: blur(12px);
            cursor: pointer;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            animation: slideDown 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes slideDown {
            from { transform: translate(-50%, -120%); opacity: 0; }
            to { transform: translate(-50%, 0); opacity: 1; }
        }

        .svg-icon {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ปุ่มเริ่มใหม่ */
        #reload-btn {
            position: fixed;
            bottom: 30px; right: 30px;
            background: rgba(20, 20, 20, 0.8);
            color: #fff;
            padding: 14px;
            border-radius: 50%;
            z-index: 3000;
            display: none;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="container">
            <h1>Memory Lens</h1>
            <p id="main-desc">กำลังโหลดโมเดล AI...</p>
            <div class="image-preview">
                <img id="target-img" src="picture.png" alt="Target Image">
            </div>
            <button class="btn-start" id="start-btn" disabled>กรุณารอสักครู่</button>
        </div>
    </div>

    <!-- แถบปุ่มดูแบบเต็มจอ -->
    <div id="fullscreen-hint">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
        ดูแบบเต็มจอ
    </div>
    
    <button id="reload-btn" onclick="location.reload()">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
    </button>

    <!-- หน้าจอแตะเพื่อเล่น -->
    <div id="play-overlay">
        <p>พบความทรงจำแล้ว แตะเพื่อรับชม</p>
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div id="scan-ui">
            <div class="status-badge">
                <svg class="svg-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                สแกนที่พวงกุญแจของคุณ
            </div>
        </div>
    </div>

    <!-- วิดีโอหลัก -->
    <video id="video-player" src="Video.mp4" playsinline loop controls></video>

    <script>
        const targetImg = document.getElementById('target-img');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const cameraContainer = document.getElementById('camera-container');
        const webcam = document.getElementById('webcam');
        const videoPlayer = document.getElementById('video-player');
        const playOverlay = document.getElementById('play-overlay');
        const fullscreenHint = document.getElementById('fullscreen-hint');
        const reloadBtn = document.getElementById('reload-btn');

        let model;
        let targetFeatures;
        let isDetected = false;
        let cameraStream = null;
        const SIMILARITY_THRESHOLD = 0.58; 

        async function init() {
            try {
                if (!targetImg.complete) await new Promise(r => targetImg.onload = r);
                model = await mobilenet.load();
                const targetTensor = tf.browser.fromPixels(targetImg);
                targetFeatures = model.infer(targetTensor, true);
                targetTensor.dispose();
                document.getElementById('main-desc').innerText = "พร้อมสแกนความทรงจำแล้ว";
                startBtn.innerText = "เริ่มสแกน";
                startBtn.disabled = false;
            } catch (e) { 
                document.getElementById('main-desc').innerText = "ไม่สามารถโหลดระบบได้";
                console.error(e); 
            }
        }

        startBtn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                openCamera();
            }, 500);
        });

        async function openCamera() {
            cameraContainer.style.display = 'block';
            try {
                cameraStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                webcam.srcObject = cameraStream;
                videoPlayer.load();
                requestAnimationFrame(predictLoop);
            } catch (err) { alert("ไม่สามารถเข้าถึงกล้องได้: " + err.message); }
        }

        async function predictLoop() {
            if (!isDetected && model) {
                try {
                    const similarity = tf.tidy(() => {
                        const webcamTensor = tf.browser.fromPixels(webcam);
                        const webcamFeatures = model.infer(webcamTensor, true);
                        const a = tf.div(targetFeatures, tf.norm(targetFeatures));
                        const b = tf.div(webcamFeatures, tf.norm(webcamFeatures));
                        return tf.sum(tf.mul(a, b)).dataSync()[0];
                    });

                    if (similarity > SIMILARITY_THRESHOLD) {
                        handleDetectionSuccess();
                        return;
                    }
                } catch (e) { }
                setTimeout(() => requestAnimationFrame(predictLoop), 100);
            }
        }

        function handleDetectionSuccess() {
            isDetected = true;
            
            if (cameraStream) {
                cameraStream.getTracks().forEach(track => track.stop());
            }
            cameraContainer.style.display = 'none';
            
            videoPlayer.style.display = 'block';
            playOverlay.style.display = 'flex';
            reloadBtn.style.display = 'block';

            playOverlay.onclick = () => {
                playOverlay.style.display = 'none';
                videoPlayer.play();
                
                fullscreenHint.style.display = 'flex';
                setTimeout(() => {
                    fullscreenHint.style.opacity = '0';
                    setTimeout(() => { fullscreenHint.style.display = 'none'; }, 500);
                }, 6000);
            };
        }

        fullscreenHint.onclick = () => {
            enterFullscreen(videoPlayer);
            fullscreenHint.style.display = 'none';
        };

        function enterFullscreen(element) {
            if (element.requestFullscreen) {
                element.requestFullscreen();
            } 
            else if (element.webkitEnterFullscreen) {
                element.webkitEnterFullscreen();
            }
            else if (element.webkitRequestFullscreen) {
                element.webkitRequestFullscreen();
            }
            else if (element.mozRequestFullScreen) {
                element.mozRequestFullScreen();
            }
            else if (element.msRequestFullscreen) {
                element.msRequestFullscreen();
            }
        }

        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);

        function handleFullscreenChange() {
            const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
            if (isFullscreen) {
                if (screen.orientation && screen.orientation.lock && videoPlayer.videoWidth > videoPlayer.videoHeight) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            } else {
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
        }

        init();
    </script>
</body>
</html>
