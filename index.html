<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Lens AI</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Kanit', sans-serif; 
            background: #fff;
            color: #000;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* หน้าจอเริ่มต้น */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            text-align: center;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .preview-box {
            position: relative;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 16 / 9;
            margin-bottom: 40px;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.1);
            background: #f9f9f9;
            box-shadow: 0 10px 40px rgba(0,0,0,0.05);
        }

        .preview-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            opacity: 0.95;
            transition: transform 1.2s ease, filter 1.2s ease;
        }

        .preview-scan-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: #000;
            z-index: 2;
            display: none;
            will-change: transform;
        }

        @keyframes scanning { 
            0% { transform: translateY(0); opacity: 0; } 
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(180px); opacity: 0; } 
        }
        
        .analyzing .preview-scan-line { 
            display: block; 
            animation: scanning 1.8s linear infinite; 
        }
        
        .analyzing img { 
            transform: scale(1.08); 
            filter: grayscale(1) contrast(1.3) brightness(0.9);
        }

        .btn-start {
            background: #000; color: #fff; border: none;
            width: 85%; max-width: 260px;
            padding: 18px 0; font-size: 1.05rem; 
            border-radius: 50px; cursor: pointer; font-weight: 600;
            font-family: 'Kanit', sans-serif;
            transition: all 0.4s ease;
            white-space: nowrap;
        }
        
        .btn-start:disabled { background: #f0f0f0; color: #ccc; cursor: not-allowed; }
        .btn-start:active { transform: scale(0.96); }

        /* ส่วนกล้องสแกน */
        #camera-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; background: #fff;
        }

        #webcam { width: 100%; height: 100%; object-fit: cover; transition: filter 0.5s ease; }

        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw; aspect-ratio: 16 / 10;
            max-width: 350px;
            border: 1.5px solid #000;
            border-radius: 12px;
            box-shadow: 0 0 0 2000px rgba(255,255,255,0.75);
            z-index: 5;
            transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
            overflow: hidden;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: #000;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            will-change: transform;
            animation: scanHardware 2.5s ease-in-out infinite;
        }

        @keyframes scanHardware { 
            0% { transform: translateY(20px); opacity: 0.3; } 
            50% { transform: translateY(180px); opacity: 1; } 
            100% { transform: translateY(20px); opacity: 0.3; } 
        }

        /* เอฟเฟกต์ตอนสแกนติด */
        #success-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #play-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #video-player {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 1500;
            object-fit: contain; background: #000;
        }

        #fullscreen-hint {
            position: fixed;
            top: -100px; left: 50%;
            transform: translateX(-50%);
            background: #fff; color: #000;
            padding: 12px 28px; border-radius: 50px;
            font-size: 0.9rem; font-weight: 600;
            z-index: 3500; display: flex;
            align-items: center; gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            border: 2px solid #000;
            transition: top 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #fullscreen-hint.show { top: 40px; }

        .status-msg {
            position: absolute;
            bottom: 15%; width: 100%;
            text-align: center; font-size: 0.85rem;
            color: #000; letter-spacing: 1px;
            z-index: 10;
        }

        .scan-indicator {
            position: absolute;
            top: 15px; right: 15px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #eee;
            transition: background 0.2s;
        }
        .scan-active { background: #000 !important; box-shadow: 0 0 12px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

    <div id="success-flash"></div>

    <!-- หน้าจอหลัก -->
    <div id="overlay">
        <div class="preview-box" id="preview-container">
            <div class="preview-scan-line"></div>
            <img id="target-img" src="memory-picture.JPG">
        </div>
        <button class="btn-start" id="start-btn" disabled>กำลังรอ...</button>
    </div>

    <!-- ปุ่มแนะนำเต็มจอ -->
    <div id="fullscreen-hint">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        ดูแบบเต็มจอ
    </div>

    <!-- ส่วนกล้อง -->
    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="scan-frame" id="scan-frame">
            <div class="scan-indicator" id="lock-indicator"></div>
            <div class="scan-line"></div>
        </div>
        <div class="status-msg" id="status-display">กำลังเตรียมระบบ AI...</div>
    </div>

    <!-- หน้าจอพบความทรงจำ -->
    <div id="play-overlay">
        <div style="width:64px;height:64px;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:16px;box-shadow:0 10px 30px rgba(0,0,0,0.1)">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span style="font-weight:600; font-size:1.1rem; letter-spacing:1px">พบความทรงจำแล้ว</span>
        <span style="font-size:0.85rem; opacity:0.5; margin-top:8px">แตะเพื่อเปิดรับชม</span>
    </div>

    <!-- เปลี่ยนจากไฟล์ Video.mp4 เป็นลิงก์ Google Drive -->
    <video id="video-player" src="https://drive.google.com/uc?id=1K6XKIMPY8ZB4O5oECe9Qg3k6urdiXyrT" playsinline loop controls crossorigin="anonymous"></video>

    <script>
        const targetImg = document.getElementById('target-img');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const previewContainer = document.getElementById('preview-container');
        const cameraContainer = document.getElementById('camera-container');
        const webcam = document.getElementById('webcam');
        const videoPlayer = document.getElementById('video-player');
        const playOverlay = document.getElementById('play-overlay');
        const lockIndicator = document.getElementById('lock-indicator');
        const statusDisplay = document.getElementById('status-display');
        const fsHint = document.getElementById('fullscreen-hint');
        const successFlash = document.getElementById('success-flash');

        let model, targetFeatures, targetGridData;
        let isDetected = false;
        let isReadyToAnalyze = false;
        
        // ความเข้มงวดอัจฉริยะ (Extreme Threshold)
        const THRESHOLD = 0.94; 
        const VARIANCE_THRESHOLD = 0.08; 
        let detectionConfidence = 0;
        const CONFIDENCE_REQUIRED = 12;

        // จุดไข่ปลาวิ่งในปุ่ม
        let dots = 0;
        const dotTimer = setInterval(() => {
            if (startBtn.disabled && startBtn.innerText.includes("กำลังรอ")) {
                dots = (dots + 1) % 4;
                startBtn.innerText = "กำลังรอ" + ".".repeat(dots);
            }
        }, 500);

        async function init() {
            try {
                if (!targetImg.complete) await new Promise(r => targetImg.onload = r);
                model = await mobilenet.load({ version: 2, alpha: 1.0 });
                
                const results = tf.tidy(() => {
                    const img = tf.browser.fromPixels(targetImg);
                    const feat = model.infer(tf.image.resizeBilinear(img, [224, 224]).expandDims(0).toFloat().div(127.5).sub(1), true);
                    
                    const h = img.shape[0], w = img.shape[1];
                    const gridH = Math.floor(h/3), gridW = Math.floor(w/3);
                    let grids = [];
                    for(let i=0; i<3; i++){
                        for(let j=0; j<3; j++){
                            const slice = img.slice([i*gridH, j*gridW, 0], [gridH, gridW, 3]);
                            grids.push(slice.mean().div(255).dataSync()[0]);
                        }
                    }
                    return { feat, grids };
                });
                
                targetFeatures = results.feat;
                targetGridData = results.grids;
                
                startBtn.innerText = "เริ่มสแกนความทรงจำ";
                startBtn.disabled = false;
                clearInterval(dotTimer);
            } catch (e) { startBtn.innerText = "โหลดผิดพลาด"; }
        }

        startBtn.onclick = () => {
            previewContainer.classList.add('analyzing');
            startBtn.disabled = true;
            setTimeout(() => {
                overlay.style.opacity = '0';
                overlay.style.transform = 'scale(0.95)';
                setTimeout(async () => {
                    overlay.style.display = 'none';
                    cameraContainer.style.display = 'block';
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                        });
                        webcam.srcObject = stream;
                        webcam.onloadedmetadata = () => {
                            videoPlayer.load();
                            setTimeout(() => {
                                isReadyToAnalyze = true;
                                statusDisplay.innerText = "จัดวางรูปถ่ายให้พอดีกรอบ";
                                requestAnimationFrame(predict);
                            }, 2500);
                        };
                    } catch (err) { statusDisplay.innerText = "ไม่สามารถเปิดกล้องได้"; }
                }, 500);
            }, 1200);
        };

        async function predict() {
            if (!isDetected && isReadyToAnalyze && webcam.readyState === 4) {
                const check = tf.tidy(() => {
                    const full = tf.browser.fromPixels(webcam);
                    const [h, w] = full.shape;
                    const size = Math.min(h, w) * 0.55;
                    const startH = (h - size) / 2, startW = (w - size) / 2;
                    
                    const cropped = tf.image.cropAndResize(full.expandDims(0).toFloat(), [[startH/h, startW/w, (startH+size)/h, (startW+size)/w]], [0], [224, 224]);
                    
                    const feat = model.infer(cropped.div(127.5).sub(1), true);
                    const sim = tf.sum(tf.mul(tf.div(targetFeatures, tf.norm(targetFeatures)), tf.div(feat, tf.norm(feat)))).dataSync()[0];

                    const gridSide = 74; 
                    const cImg = cropped.squeeze();
                    let currentGrids = [];
                    for(let i=0; i<3; i++){
                        for(let j=0; j<3; j++){
                            const slice = cImg.slice([i*gridSide, j*gridSide, 0], [gridSide, gridSide, 3]);
                            currentGrids.push(slice.mean().div(255).dataSync()[0]);
                        }
                    }

                    let diffSum = 0;
                    let mean = currentGrids.reduce((a, b) => a + b) / 9;
                    let variance = currentGrids.reduce((a, b) => a + Math.pow(b - mean, 2)) / 9;

                    for(let i=0; i<9; i++) diffSum += Math.abs(currentGrids[i] - targetGridData[i]);
                    const colorMatch = (diffSum / 9) < 0.15;
                    const hasTexture = variance > VARIANCE_THRESHOLD; 

                    return { sim, colorMatch, hasTexture };
                });

                if (check.sim > THRESHOLD && check.colorMatch && check.hasTexture) {
                    detectionConfidence++;
                    lockIndicator.classList.add('scan-active');
                    if (detectionConfidence >= CONFIDENCE_REQUIRED) {
                        triggerSuccess();
                        return;
                    }
                } else {
                    detectionConfidence = 0;
                    lockIndicator.classList.remove('scan-active');
                }
                setTimeout(() => requestAnimationFrame(predict), 100);
            } else if (!isDetected) requestAnimationFrame(predict);
        }

        function triggerSuccess() {
            isDetected = true;
            successFlash.style.opacity = '1';
            webcam.style.filter = 'brightness(2) contrast(0.5) blur(10px)';
            const frame = document.getElementById('scan-frame');
            frame.style.transform = 'translate(-50%, -50%) scale(0.5)';
            frame.style.opacity = '0';

            setTimeout(() => {
                if (webcam.srcObject) webcam.srcObject.getTracks().forEach(t => t.stop());
                cameraContainer.style.display = 'none';
                successFlash.style.opacity = '0';
                
                videoPlayer.style.display = 'block';
                playOverlay.style.display = 'flex';
                setTimeout(() => playOverlay.style.opacity = '1', 50);
            }, 400);
        }

        playOverlay.onclick = () => {
            playOverlay.style.opacity = '0';
            setTimeout(() => {
                playOverlay.style.display = 'none';
                videoPlayer.play();
                setTimeout(() => {
                    const isFS = document.fullscreenElement || document.webkitFullscreenElement;
                    if (!isFS) fsHint.classList.add('show');
                    setTimeout(() => fsHint.classList.remove('show'), 6000);
                }, 2000);
            }, 400);
        };

        fsHint.onclick = () => {
            const el = videoPlayer;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitEnterFullscreen) el.webkitEnterFullscreen();
            fsHint.classList.remove('show');
        };

        init();
    </script>
</body>
</html>
