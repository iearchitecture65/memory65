<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory 65</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Kanit', sans-serif; 
            background: #fff;
            color: #000;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* หน้าจอเริ่มต้น */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            text-align: center;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .preview-box {
            position: relative;
            width: 100%;
            max-width: 280px;
            aspect-ratio: 16 / 9;
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.08);
            background: #fdfdfd;
        }

        .preview-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            opacity: 0.9;
            transition: transform 1.2s ease, filter 0.5s ease;
        }

        .preview-scan-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: #000;
            z-index: 2;
            display: none;
            will-change: transform;
        }

        @keyframes scanDownOnce { 
            0% { transform: translateY(0); opacity: 1; } 
            100% { transform: translateY(157px); opacity: 1; } 
        }

        @keyframes flashEffect {
            0%, 100% { opacity: 0.9; filter: grayscale(1) brightness(1); }
            50% { opacity: 0.4; filter: grayscale(1) brightness(2); }
        }
        
        .analyzing .preview-scan-line { 
            display: block; 
            animation: scanDownOnce 1.2s forwards; 
        }
        
        .analyzing img { 
            filter: grayscale(1) brightness(0.95);
        }

        .flashing img {
            animation: flashEffect 0.2s infinite;
        }

        .btn-start {
            background: #000;
            color: #fff;
            border: none;
            width: auto;
            min-width: 160px;
            padding: 14px 28px;
            font-size: 0.9rem; 
            letter-spacing: 1px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 400;
            font-family: 'Kanit', sans-serif;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .btn-start:disabled { background: #f0f0f0; color: #ccc; box-shadow: none; cursor: not-allowed; }
        .btn-start:active { transform: scale(0.95); }

        #camera-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; background: #fff;
        }

        #webcam { width: 100%; height: 100%; object-fit: cover; transition: filter 0.5s ease; }

        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 75vw; aspect-ratio: 16 / 10;
            max-width: 300px;
            border: 1.5px solid #000;
            border-radius: 8px;
            box-shadow: 0 0 0 2000px rgba(255,255,255,0.85);
            z-index: 5;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 1px;
            background: #000;
            will-change: transform;
            animation: scanHardware 3s ease-in-out infinite;
        }

        @keyframes scanHardware { 
            0%, 100% { transform: translateY(10px); opacity: 0.2; } 
            50% { transform: translateY(170px); opacity: 0.8; } 
        }

        /* ปุ่มแฟลช */
        #flash-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50%;
            display: none; 
            align-items: center;
            justify-content: center;
            z-index: 100;
            border: 1px solid #000;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: popIn 0.4s ease-out;
        }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        #flash-btn.active { background: #000; color: #fff; }

        #success-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        /* Video Container */
        #video-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 1500;
            background: #000;
        }
        
        #video-container iframe {
            width: 100%; height: 100%;
            border: 0;
        }

        /* ปุ่มเต็มจอแบบเด้งลงมาจากด้านบนกึ่งกลาง */
        #fullscreen-toggle {
            position: absolute;
            top: -100px; 
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            color: #fff;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 0.85rem;
            z-index: 1600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 300;
            letter-spacing: 0.5px;
            transition: top 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        #fullscreen-toggle.show {
            top: 30px;
        }

        #fullscreen-toggle:active { transform: translateX(-50%) scale(0.95); background: rgba(255,255,255,0.4); }

        .status-msg {
            position: absolute;
            bottom: 12%; width: 100%;
            text-align: center; font-size: 0.9rem;
            color: #000; letter-spacing: 0.5px;
            font-weight: 400;
            z-index: 10;
            padding: 0 20px;
        }

        .status-sub-msg {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
            font-weight: 300;
        }

        .scan-indicator {
            position: absolute;
            top: 10px; right: 10px;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #eee;
        }
        .scan-active { background: #000 !important; }
    </style>
</head>
<body>

    <div id="success-flash"></div>

    <!-- หน้าจอเริ่มต้น -->
    <div id="overlay">
        <div class="preview-box" id="preview-container">
            <div class="preview-scan-line"></div>
            <img id="target-img" src="memory-picture.JPG">
        </div>
        <button class="btn-start" id="start-btn" disabled>กำลังรอ...</button>
    </div>

    <!-- ส่วนกล้อง -->
    <div id="camera-container">
        <div id="flash-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <video id="webcam" autoplay playsinline></video>
        <div class="scan-frame" id="scan-frame">
            <div class="scan-indicator" id="lock-indicator"></div>
            <div class="scan-line"></div>
        </div>
        <div class="status-msg" id="status-display">
            ส่องไปที่รูปภาพความทรงจำ
            <span class="status-sub-msg" id="sub-status">กำลังเตรียมระบบ AI...</span>
        </div>
    </div>

    <!-- Video Container -->
    <div id="video-container">
        <button id="fullscreen-toggle">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 3h6v6M9 21H3v-6M21 15v6h-6M3 9V3h6"/></svg>
            ดูแบบเต็มจอ
        </button>
        <div id="iframe-target" style="width: 100%; height: 100%;"></div>
    </div>

    <script>
        const DRIVE_ID = "1myp5J_EBbO9jZJyTk-5kid2Qy5aBpRHQ";
        const PREVIEW_URL = `https://drive.google.com/file/d/${DRIVE_ID}/preview?autoplay=1`;

        const targetImg = document.getElementById('target-img');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const previewContainer = document.getElementById('preview-container');
        const cameraContainer = document.getElementById('camera-container');
        const webcam = document.getElementById('webcam');
        const videoContainer = document.getElementById('video-container');
        const iframeTarget = document.getElementById('iframe-target');
        const fsToggle = document.getElementById('fullscreen-toggle');
        const lockIndicator = document.getElementById('lock-indicator');
        const subStatus = document.getElementById('sub-status');
        const flashBtn = document.getElementById('flash-btn');
        const successFlash = document.getElementById('success-flash');

        let model, targetFeatures, targetGridData;
        let isDetected = false;
        let isReadyToAnalyze = false;
        let videoStream = null;
        let isFlashOn = false;
        
        const THRESHOLD = 0.90; 
        const VARIANCE_THRESHOLD = 0.08; 
        const COLOR_MATCH_TOLERANCE = 0.18; 
        const BRIGHTNESS_THRESHOLD = 0.22; 
        let detectionConfidence = 0;
        const CONFIDENCE_REQUIRED = 10; 

        let dots = 0;
        const dotTimer = setInterval(() => {
            if (startBtn.disabled && startBtn.innerText.includes("กำลังรอ")) {
                dots = (dots + 1) % 4;
                startBtn.innerText = "กำลังรอ" + ".".repeat(dots);
            }
        }, 500);

        async function init() {
            try {
                if (!targetImg.complete) await new Promise(r => targetImg.onload = r);
                model = await mobilenet.load({ version: 2, alpha: 1.0 });
                
                const results = tf.tidy(() => {
                    const img = tf.browser.fromPixels(targetImg);
                    const feat = model.infer(tf.image.resizeBilinear(img, [224, 224]).expandDims(0).toFloat().div(127.5).sub(1), true);
                    const h = img.shape[0], w = img.shape[1];
                    const gridH = Math.floor(h/3), gridW = Math.floor(w/3);
                    let grids = [];
                    for(let i=0; i<3; i++){
                        for(let j=0; j<3; j++){
                            const slice = img.slice([i*gridH, j*gridW, 0], [gridH, gridW, 3]);
                            grids.push(slice.mean().div(255).dataSync()[0]);
                        }
                    }
                    return { feat, grids };
                });
                
                targetFeatures = results.feat;
                targetGridData = results.grids;
                
                startBtn.innerText = "เริ่มสัมผัสความทรงจำ";
                startBtn.disabled = false;
                clearInterval(dotTimer);
            } catch (e) { startBtn.innerText = "เกิดข้อผิดพลาด"; }
        }

        startBtn.onclick = () => {
            previewContainer.classList.add('analyzing');
            startBtn.disabled = true;
            setTimeout(() => {
                previewContainer.classList.add('flashing');
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(async () => {
                        overlay.style.display = 'none';
                        cameraContainer.style.display = 'block';
                        try {
                            videoStream = await navigator.mediaDevices.getUserMedia({ 
                                video: { 
                                    facingMode: "environment", 
                                    width: { ideal: 1280 }, 
                                    height: { ideal: 720 },
                                    // ขอซูมเบื้องต้น
                                    zoom: 2.0
                                } 
                            });
                            webcam.srcObject = videoStream;
                            webcam.onloadedmetadata = () => {
                                // พยายามสั่งซูมเลนส์กล้องจริง (สำหรับเครื่องที่รองรับ)
                                const track = videoStream.getVideoTracks()[0];
                                const capabilities = track.getCapabilities();
                                if (capabilities.zoom) {
                                    track.applyConstraints({
                                        advanced: [{ zoom: Math.min(capabilities.zoom.max, 2.0) }]
                                    }).catch(() => {});
                                }

                                if (capabilities.torch) flashBtn.style.display = 'flex';

                                setTimeout(() => {
                                    isReadyToAnalyze = true;
                                    requestAnimationFrame(predict);
                                }, 2000);
                            };
                        } catch (err) { subStatus.innerText = "ไม่สามารถเข้าถึงกล้องได้"; }
                    }, 500);
                }, 800); 
            }, 1200);
        };

        flashBtn.onclick = async () => {
            if (!videoStream) return;
            const track = videoStream.getVideoTracks()[0];
            try {
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
                flashBtn.classList.toggle('active', isFlashOn);
            } catch (e) { console.warn("Flash not supported."); }
        };

        async function predict() {
            if (!isDetected && isReadyToAnalyze && webcam.readyState === 4) {
                const check = tf.tidy(() => {
                    const full = tf.browser.fromPixels(webcam);
                    const [h, w] = full.shape;
                    
                    // ปรับ ROI ให้เจาะจงจุดกึ่งกลางมากขึ้น (จำลอง Digital Zoom สำหรับ AI)
                    const roiW = w * 0.42; // บีบพื้นที่วิเคราะห์ให้แคบลงเพื่อความแม่นยำของการซูม
                    const roiH = roiW * (10/16);
                    const startY = (h - roiH) / 2;
                    const startX = (w - roiW) / 2;
                    const cropped = tf.image.cropAndResize(full.expandDims(0).toFloat(), [[startY/h, startX/w, (startY+roiH)/h, (startX+roiW)/w]], [0], [224, 224]);
                    const feat = model.infer(cropped.div(127.5).sub(1), true);
                    const sim = tf.sum(tf.mul(tf.div(targetFeatures, tf.norm(targetFeatures)), tf.div(feat, tf.norm(feat)))).dataSync()[0];
                    const gridSide = 74; 
                    const cImg = cropped.squeeze();
                    let currentGrids = [];
                    for(let i=0; i<3; i++){
                        for(let j=0; j<3; j++){
                            const slice = cImg.slice([i*gridSide, j*gridSide, 0], [gridSide, gridSide, 3]);
                            currentGrids.push(slice.mean().div(255).dataSync()[0]);
                        }
                    }
                    const brightness = currentGrids.reduce((a, b) => a + b) / 9;
                    let diffSum = 0;
                    let mean = currentGrids.reduce((a, b) => a + b) / 9;
                    let variance = currentGrids.reduce((a, b) => a + Math.pow(b - mean, 2)) / 9;
                    for(let i=0; i<9; i++) diffSum += Math.abs(currentGrids[i] - targetGridData[i]);
                    const colorMatch = (diffSum / 9) < COLOR_MATCH_TOLERANCE;
                    const hasTexture = variance > VARIANCE_THRESHOLD; 
                    return { sim, colorMatch, hasTexture, brightness };
                });

                if (check.brightness < BRIGHTNESS_THRESHOLD) {
                    subStatus.innerText = "สภาพแสงมืดเกินไป กรุณาเพิ่มความสว่าง";
                    subStatus.style.color = "#ff3b30";
                    if (flashBtn.style.display !== 'flex') flashBtn.style.display = 'flex';
                } else {
                    subStatus.style.color = "#000";
                    if (!check.hasTexture) subStatus.innerText = "กรุณาวางรูปถ่ายให้เข้าใกล้กรอบสแกน";
                    else if (check.sim < 0.7) subStatus.innerText = "ขยับรูปให้ตรงจุดกึ่งกลางของกรอบ";
                    else if (check.sim < THRESHOLD) subStatus.innerText = "เกือบแล้ว... ถือนิ่งๆ ไว้สักครู่";
                    else subStatus.innerText = "กำลังวิเคราะห์ความทรงจำ...";
                }

                if (check.sim > THRESHOLD && check.colorMatch && check.hasTexture) {
                    detectionConfidence++;
                    lockIndicator.classList.add('scan-active');
                    if (detectionConfidence >= CONFIDENCE_REQUIRED) {
                        triggerSuccess();
                        return;
                    }
                } else {
                    detectionConfidence = 0;
                    lockIndicator.classList.remove('scan-active');
                }
                setTimeout(() => requestAnimationFrame(predict), 100);
            } else if (!isDetected) requestAnimationFrame(predict);
        }

        function triggerSuccess() {
            isDetected = true;
            successFlash.style.opacity = '1';
            webcam.style.filter = 'blur(15px)';
            const frame = document.getElementById('scan-frame');
            frame.style.transform = 'translate(-50%, -50%) scale(0.8)';
            frame.style.opacity = '0';
            flashBtn.style.display = 'none';

            setTimeout(() => {
                if (videoStream) videoStream.getTracks().forEach(t => t.stop());
                cameraContainer.style.display = 'none';
                successFlash.style.opacity = '0';
                
                const iframe = document.createElement('iframe');
                iframe.id = "video-iframe";
                iframe.src = PREVIEW_URL;
                iframe.allow = "autoplay; fullscreen";
                iframe.allowFullscreen = true;
                
                iframe.onload = () => {
                    setTimeout(() => {
                        fsToggle.classList.add('show');
                    }, 2000); 
                };

                iframeTarget.innerHTML = '';
                iframeTarget.appendChild(iframe);
                videoContainer.style.display = 'block';

            }, 400);
        }

        fsToggle.onclick = () => {
            const el = videoContainer; 
            const requestFS = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
            
            if (requestFS) {
                requestFS.call(el).then(() => {
                    fsToggle.classList.remove('show');
                    setTimeout(() => fsToggle.style.display = 'none', 600);
                }).catch(err => {
                    console.error("Fullscreen failed:", err);
                    const iframe = document.getElementById('video-iframe');
                    if (iframe && iframe.webkitEnterFullscreen) iframe.webkitEnterFullscreen();
                });
            }
        };

        init();
    </script>
</body>
</html>
