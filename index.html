<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Lens</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Sarabun', sans-serif; 
            background: #000;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
        }
        
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .preview-box {
            width: 280px;
            aspect-ratio: 16 / 9;
            margin-bottom: 40px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .preview-box img { width: 100%; height: 100%; object-fit: cover; opacity: 0.8; }

        .btn-start {
            background: #fff; color: #000; border: none;
            padding: 15px 50px; font-size: 1.1rem; 
            border-radius: 50px; cursor: pointer; font-weight: 600;
            transition: transform 0.2s;
        }
        
        .btn-start:disabled { background: #222; color: #444; }
        .btn-start:active { transform: scale(0.95); }

        #camera-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
        }

        #webcam { width: 100%; height: 100%; object-fit: cover; }

        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw; aspect-ratio: 16 / 10;
            max-width: 350px;
            border: 1px solid rgba(255,255,255,0.5);
            border-radius: 10px;
            box-shadow: 0 0 0 1000px rgba(0,0,0,0.5);
        }

        .scan-line {
            position: absolute;
            top: 0; width: 100%; height: 2px;
            background: #fff;
            box-shadow: 0 0 15px #fff;
            animation: scan 2s ease-in-out infinite;
        }

        @keyframes scan { 0%, 100% { top: 5%; } 50% { top: 95%; } }

        #play-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        #video-player {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            z-index: 1500;
            object-fit: contain;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="preview-box">
            <img id="target-img" src="memory-picture.JPG">
        </div>
        <button class="btn-start" id="start-btn" disabled>กำลังโหลด...</button>
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="scan-frame"><div class="scan-line"></div></div>
    </div>

    <div id="play-overlay">
        <div style="width:60px;height:60px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:15px">
            <svg width="24" height="24" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span style="letter-spacing:1px; font-size:0.9rem">แตะเพื่อดูความทรงจำ</span>
    </div>

    <video id="video-player" src="Video.mp4" playsinline loop controls></video>

    <script>
        const targetImg = document.getElementById('target-img');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const cameraContainer = document.getElementById('camera-container');
        const webcam = document.getElementById('webcam');
        const videoPlayer = document.getElementById('video-player');
        const playOverlay = document.getElementById('play-overlay');

        let model, targetFeatures;
        let isDetected = false;
        const THRESHOLD = 0.58;

        async function init() {
            try {
                if (!targetImg.complete) await new Promise(r => targetImg.onload = r);
                model = await mobilenet.load();
                const targetTensor = tf.browser.fromPixels(targetImg);
                targetFeatures = model.infer(targetTensor, true);
                targetTensor.dispose();
                
                startBtn.innerText = "เริ่มสแกน";
                startBtn.disabled = false;
            } catch (e) { startBtn.innerText = "ผิดพลาด"; }
        }

        startBtn.onclick = () => {
            overlay.style.opacity = '0';
            setTimeout(async () => {
                overlay.style.display = 'none';
                cameraContainer.style.display = 'block';
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment" }, audio: false 
                });
                webcam.srcObject = stream;
                videoPlayer.load();
                requestAnimationFrame(predict);
            }, 500);
        };

        async function predict() {
            if (!isDetected && webcam.readyState === 4) {
                const score = tf.tidy(() => {
                    const feat = model.infer(tf.browser.fromPixels(webcam), true);
                    const a = tf.div(targetFeatures, tf.norm(targetFeatures));
                    const b = tf.div(feat, tf.norm(feat));
                    return tf.sum(tf.mul(a, b)).dataSync()[0];
                });

                if (score > THRESHOLD) {
                    isDetected = true;
                    webcam.srcObject.getTracks().forEach(t => t.stop());
                    cameraContainer.style.display = 'none';
                    videoPlayer.style.display = 'block';
                    playOverlay.style.display = 'flex';
                }
                setTimeout(() => requestAnimationFrame(predict), 200);
            } else if (!isDetected) requestAnimationFrame(predict);
        }

        playOverlay.onclick = () => {
            playOverlay.style.display = 'none';
            videoPlayer.play();
        };

        init();
    </script>
</body>
</html>
