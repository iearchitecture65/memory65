<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Lens - AR Keychain</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- A-Frame & AR.js -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    
    <style>
        :root {
            --accent-color: #ffffff;
            --bg-gradient: linear-gradient(180deg, #1a1a1a 0%, #000000 100%);
            --glass-bg: rgba(255, 255, 255, 0.1);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Sarabun', sans-serif; 
            background: #000;
            color: #fff;
        }
        
        /* สไตล์หน้าจอเริ่มต้นแบบ Minimalist */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
        }

        .container {
            max-width: 300px;
            text-align: center;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-size: 1.5rem;
        }

        p {
            font-weight: 300;
            font-size: 0.9rem;
            opacity: 0.7;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .marker-box {
            width: 120px;
            height: 120px;
            background: white;
            padding: 10px;
            border-radius: 20px;
            margin: 0 auto 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .marker-box img { width: 100%; border-radius: 5px; }

        .btn-start {
            background: transparent;
            color: white;
            border: 1px solid rgba(255,255,255,0.4);
            padding: 15px 40px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            border-radius: 100px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .btn-start:hover {
            background: white;
            color: black;
            border-color: white;
        }

        /* Scanning UI */
        #ui-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        .scan-reticle {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 40px;
        }

        .scan-msg {
            position: absolute;
            bottom: 60px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.8;
        }

        /* เอฟเฟกต์จุดโหลด */
        .dots { display: inline-block; width: 20px; text-align: left; }

        a-scene { display: none; }
    </style>
</head>
<body>

    <!-- หน้าจอเปิดเครื่อง -->
    <div id="overlay">
        <div class="container">
            <h1>Memory Lens</h1>
            <p>ส่องไปที่พวงกุญแจ<br>เพื่อย้อนคืนความทรงจำ</p>
            
            <div class="marker-box">
                <img src="https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png" alt="Marker Preview">
            </div>

            <button class="btn-start" id="btnStart">เริ่มการทำงาน</button>
        </div>
    </div>

    <!-- UI ขณะกำลังสแกน -->
    <div id="ui-layer">
        <div class="scan-reticle"></div>
        <div class="scan-msg" id="scanMsg">กำลังรอสแกน<span class="dots" id="dots">...</span></div>
    </div>

    <!-- AR Scene -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
        renderer="antialias: true; alpha: true; precision: medium;"
        vr-mode-ui="enabled: false">
        
        <a-assets>
            <video id="v" 
                   src="https://vjs.zencdn.net/v/oceans.mp4" 
                   preload="auto" 
                   loop="true" 
                   crossorigin="anonymous" 
                   playsinline 
                   webkit-playsinline
                   muted>
            </video>
        </a-assets>

        <a-marker preset="hiro" id="marker">
            <!-- วิดีโอดีไซน์แบบไร้ขอบ (Borderless) -->
            <a-video 
                src="#v" 
                width="1.6" 
                height="0.9" 
                position="0 0.01 0" 
                rotation="-90 0 0">
            </a-video>
        </a-marker>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('btnStart');
        const overlay = document.getElementById('overlay');
        const scene = document.querySelector('a-scene');
        const uiLayer = document.getElementById('ui-layer');
        const video = document.getElementById('v');
        const marker = document.getElementById('marker');
        const scanMsg = document.getElementById('scanMsg');
        const dots = document.getElementById('dots');

        // อนิเมชั่นจุดไข่ปลา
        let dotCount = 0;
        setInterval(() => {
            dotCount = (dotCount + 1) % 4;
            dots.innerText = ".".repeat(dotCount);
        }, 500);

        btn.addEventListener('click', async () => {
            // ค่อยๆ จางหน้าจอ Overlay
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                scene.style.display = 'block';
                uiLayer.style.display = 'block';
            }, 800);

            // ปลดล็อกวิดีโอ (จำเป็นสำหรับเบราว์เซอร์ส่วนใหญ่)
            try {
                video.load();
                await video.play();
                video.pause();
            } catch (e) {
                console.log("Waiting for user interaction to play video.");
            }
        });

        marker.addEventListener('markerFound', () => {
            scanMsg.innerText = "กำลังเล่นวิดีโอ";
            video.muted = false;
            video.play().catch(e => console.error("Play failed:", e));
        });

        marker.addEventListener('markerLost', () => {
            scanMsg.innerHTML = 'กำลังรอสแกน<span class="dots" id="dots">...</span>';
            video.pause();
        });

        // จัดการ Error แบบเงียบๆ ไม่ให้รบกวนหน้าจอ
        window.addEventListener('unhandledrejection', (event) => {
            event.preventDefault();
            console.warn('Silent catch:', event.reason);
        });
    </script>
</body>
</html>
