<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory 65</title>
    
    <!-- Set memory picture as website favicon -->
    <link rel="shortcut icon" href="memory-picture.JPG" type="image/x-icon">
    <link rel="icon" href="memory-picture.JPG" type="image/x-icon">
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Kanit', sans-serif; 
            background: #fff;
            color: #000;
        }
        
        /* Initial Overlay Screen */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            text-align: center;
            transition: opacity 0.6s ease;
        }

        .header-container {
            margin-bottom: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeInDown 1s ease-out;
        }

        .site-title {
            font-size: 1.2rem;
            font-weight: 600;
            letter-spacing: 4px;
            color: #000;
            margin: 0;
            text-transform: uppercase;
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .preview-box {
            position: relative;
            width: 100%;
            max-width: 280px;
            aspect-ratio: 16 / 9;
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.08);
            background: #fdfdfd;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* รูปภาพปกติ (สี) */
        .preview-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            opacity: 0;
            transition: opacity 1s ease;
            transform-origin: center center;
        }
        .preview-box img.loaded { opacity: 0.9; }

        /* รูปภาพขาวดำที่จะค่อยๆ ปรากฏทับ (Progressive Grayscale) */
        .grayscale-overlay {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(1);
            clip-path: inset(0 0 100% 0); /* เริ่มจากซ่อนไว้ด้านบน */
            z-index: 1;
            opacity: 0;
            transition: opacity 1s ease;
        }
        .preview-box img.loaded + .grayscale-overlay { opacity: 1; }

        /* แอนิเมชันจุดขยับ (...) */
        .dots::after {
            content: '';
            animation: dotCycle 1.5s steps(1) infinite;
        }

        @keyframes dotCycle {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }

        /* แอนิเมชันหลักเมื่อเริ่มสแกน */
        .start-animating .grayscale-overlay {
            animation: revealBW 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        /* แอนิเมชันกระพริบ 1 ครั้งและขยาย หลังจากสแกนจบ (เริ่มที่วินาทีที่ 1.5) */
        @keyframes singleFlashAndZoom {
            0% { filter: brightness(1); transform: scale(1); opacity: 1; }
            15% { filter: brightness(2.5); transform: scale(1.05); opacity: 1; }
            30% { filter: brightness(1); transform: scale(1.08); opacity: 1; }
            100% { filter: brightness(1.1); transform: scale(1.15); opacity: 0; }
        }

        .start-animating .preview-box {
            animation: singleFlashAndZoom 1s 1.5s ease-out forwards;
        }

        @keyframes revealBW {
            from { clip-path: inset(0 0 100% 0); }
            to { clip-path: inset(0 0 0 0); }
        }

        /* เส้นสแกนตอนเปลี่ยนหน้า - วิ่งถึงพื้นใน 1.5 วินาที พร้อมภาพขาวดำ */
        .preview-scan-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: #000;
            z-index: 2;
            display: none;
            will-change: transform;
        }

        @keyframes scanOnceSmooth { 
            0% { transform: translateY(0); opacity: 1; } 
            100% { transform: translateY(157px); opacity: 1; } 
        }

        .start-animating .preview-scan-line {
            display: block;
            animation: scanOnceSmooth 1.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        .img-loader {
            position: absolute;
            width: 24px; height: 24px;
            border: 2px solid #eee;
            border-top: 2px solid #000;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .btn-start {
            background: #000; color: #fff; border: none;
            width: auto; min-width: 160px; padding: 14px 28px;
            font-size: 0.9rem; letter-spacing: 1px; border-radius: 100px;
            cursor: pointer; font-weight: 400; font-family: 'Kanit', sans-serif;
            transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex; align-items: center; justify-content: center;
        }
        
        .btn-start:disabled { background: #f0f0f0; color: #ccc; box-shadow: none; cursor: not-allowed; }

        /* Camera Scanner Section */
        #camera-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; background: #fff;
            z-index: 500;
        }

        #webcam { 
            width: 100%; height: 100%; object-fit: cover; 
            transition: filter 0.5s ease, transform 0.3s cubic-bezier(0.19, 1, 0.22, 1);
            transform-origin: center center;
            pointer-events: none;
        }

        video::-webkit-media-controls { display:none !important; }
        video::-webkit-media-controls-enclosure { display:none !important; }

        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 75vw; aspect-ratio: 16 / 10;
            max-width: 300px;
            border: 1.5px solid #000;
            border-radius: 8px;
            box-shadow: 0 0 0 2000px rgba(255,255,255,0.85);
            z-index: 510;
            transition: all 0.5s ease;
            overflow: hidden;
            pointer-events: none;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 1px;
            background: #000;
            will-change: transform;
            animation: scanHardware 3s ease-in-out infinite;
        }

        @keyframes scanHardware { 
            0%, 100% { transform: translateY(10px); opacity: 0.2; } 
            50% { transform: translateY(170px); opacity: 0.8; } 
        }

        /* Zoom Controls */
        .zoom-controls {
            position: absolute;
            bottom: 22%; left: 50%; transform: translateX(-50%);
            display: flex; gap: 12px; z-index: 600;
        }

        .zoom-btn {
            width: 40px; height: 40px;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.1); border-radius: 50%;
            font-size: 0.7rem; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .zoom-btn.active { background: #000; color: #fff; border-color: #000; transform: scale(1.1); }

        #success-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff; z-index: 3000; opacity: 0;
            pointer-events: none; transition: opacity 0.4s ease;
        }

        #video-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none !important;
            z-index: 1000;
            background: #000;
        }

        #video-container.active {
            display: block !important;
        }
        
        #video-container iframe { width: 100%; height: 100%; border: 0; }

        /* Centered Status Messages */
        .status-msg {
            position: absolute;
            bottom: 12%; width: 100%;
            text-align: center; font-size: 0.9rem;
            color: #000; letter-spacing: 0.5px;
            font-weight: 400;
            z-index: 550;
            padding: 0 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .status-sub-msg {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
            font-weight: 300;
            min-height: 1.5em;
        }
        
        .scan-indicator {
            position: absolute;
            top: 10px; right: 10px;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #eee;
        }
        .scan-active { background: #000 !important; }
    </style>
</head>
<body>

    <div id="success-flash"></div>

    <!-- Start Overlay Screen -->
    <div id="overlay">
        <div class="header-container">
            <h1 class="site-title">Memory 65</h1>
        </div>

        <div class="preview-box" id="preview-container">
            <div class="img-loader" id="img-loader"></div>
            <div class="preview-scan-line"></div>
            <img id="target-img" src="memory-picture.JPG">
            <!-- ภาพขาวดำสำหรับการไล่สี -->
            <img class="grayscale-overlay" src="memory-picture.JPG">
        </div>
        <button class="btn-start" id="start-btn" disabled>
            <span id="btn-text">กำลังรอ</span><span class="dots"></span>
        </button>
    </div>

    <!-- Camera Scanner View -->
    <div id="camera-container">
        <video id="webcam" autoplay playsinline muted disablePictureInPicture webkit-playsinline></video>
        
        <div class="zoom-controls" id="zoom-ui">
            <div class="zoom-btn active" data-zoom="1.0">1x</div>
            <div class="zoom-btn" data-zoom="2.0">2x</div>
        </div>

        <div class="scan-frame" id="scan-frame">
            <div class="scan-indicator" id="lock-indicator"></div>
            <div class="scan-line"></div>
        </div>
        <div class="status-msg" id="status-display">
            <span>ส่องไปที่รูปภาพความทรงจำ</span>
            <div class="status-sub-msg" id="sub-status-container">
                <span id="sub-status-text">กำลังเตรียมระบบ</span><span class="dots"></span>
            </div>
        </div>
    </div>

    <!-- Video Container -->
    <div id="video-container">
        <div id="iframe-target" style="width: 100%; height: 100%;"></div>
    </div>

    <script>
        const DRIVE_ID = "1myp5J_EBbO9jZJyTk-5kid2Qy5aBpRHQ";
        const PREVIEW_URL = `https://drive.google.com/file/d/${DRIVE_ID}/preview`;

        const targetImg = document.getElementById('target-img');
        const startBtn = document.getElementById('start-btn');
        const btnText = document.getElementById('btn-text');
        const overlay = document.getElementById('overlay');
        const previewContainer = document.getElementById('preview-container');
        const cameraContainer = document.getElementById('camera-container');
        const webcam = document.getElementById('webcam');
        const videoContainer = document.getElementById('video-container');
        const iframeTarget = document.getElementById('iframe-target');
        const lockIndicator = document.getElementById('lock-indicator');
        const subStatusText = document.getElementById('sub-status-text');
        const subStatusContainer = document.getElementById('sub-status-container');
        const imgLoader = document.getElementById('img-loader');
        const zoomBtns = document.querySelectorAll('.zoom-btn');

        let model, targetFeatures, targetGridData;
        let isDetected = false;
        let isReadyToAnalyze = false;
        let videoStream = null;
        let currentZoomLevel = 1.0;
        let lastStatusMsg = "";
        
        // --- High Strictness Constants ---
        const THRESHOLD = 0.95; 
        const COLOR_MATCH_TOLERANCE = 0.12; 
        const BRIGHTNESS_THRESHOLD = 0.20; 
        const VARIANCE_THRESHOLD = 0.15; 
        let detectionConfidence = 0;
        const CONFIDENCE_REQUIRED = 20; 

        function updateStatus(msg, color = "#000") {
            if (lastStatusMsg === msg) return;
            lastStatusMsg = msg;
            subStatusContainer.style.color = color;
            subStatusText.innerText = msg;
        }

        async function init() {
            try {
                if (!targetImg.complete) {
                    await new Promise(r => {
                        targetImg.onload = () => {
                            targetImg.classList.add('loaded');
                            imgLoader.style.display = 'none';
                            r();
                        };
                        targetImg.onerror = r;
                    });
                } else {
                    targetImg.classList.add('loaded');
                    imgLoader.style.display = 'none';
                }

                model = await mobilenet.load({ version: 2, alpha: 1.0 });
                
                const results = tf.tidy(() => {
                    const img = tf.browser.fromPixels(targetImg);
                    const feat = model.infer(tf.image.resizeBilinear(img, [224, 224]).expandDims(0).toFloat().div(127.5).sub(1), true);
                    const h = img.shape[0], w = img.shape[1], gh = Math.floor(h/3), gw = Math.floor(w/3);
                    let grids = [];
                    for(let i=0; i<3; i++) for(let j=0; j<3; j++) grids.push(img.slice([i*gh, j*gw, 0], [gh, gw, 3]).mean().div(255).dataSync()[0]);
                    return { feat, grids };
                });
                
                targetFeatures = results.feat;
                targetGridData = results.grids;
                
                btnText.innerText = 'เริ่มสแกน';
                const buttonDots = startBtn.querySelector('.dots');
                if (buttonDots) buttonDots.classList.remove('dots');
                startBtn.disabled = false;
            } catch (e) { btnText.innerText = "เกิดข้อผิดพลาด"; }
        }

        startBtn.onclick = () => {
            // เริ่มแอนิเมชันลำดับขั้น (สแกนพร้อมขาวดำ -> กระพริบ 1 ครั้ง)
            previewContainer.classList.add('start-animating');
            startBtn.disabled = true;
            
            // หน่วงเวลา 2.5 วินาที (สแกน 1.5s + กระพริบ/ขยาย 1s)
            setTimeout(() => {
                overlay.style.opacity = '0';
                setTimeout(async () => {
                    overlay.style.display = 'none';
                    cameraContainer.style.display = 'block';
                    try {
                        videoStream = await navigator.mediaDevices.getUserMedia({ 
                            video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                        });
                        webcam.srcObject = videoStream;
                        webcam.onloadedmetadata = () => {
                            zoomBtns.forEach(btn => {
                                btn.onclick = () => applyAdaptiveZoom(parseFloat(btn.dataset.zoom), btn);
                            });
                            setTimeout(() => {
                                isReadyToAnalyze = true;
                                requestAnimationFrame(predict);
                            }, 2000);
                        };
                    } catch (err) { updateStatus('ไม่สามารถเข้าถึงกล้องได้', '#ff3b30'); }
                }, 500);
            }, 2500);
        };

        async function applyAdaptiveZoom(val, el) {
            if (!videoStream) return;
            const track = videoStream.getVideoTracks()[0];
            const caps = track.getCapabilities();
            zoomBtns.forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            currentZoomLevel = val;
            webcam.style.transform = `scale(${val})`;
            if (caps.zoom) {
                try {
                    const target = Math.max(caps.zoom.min, Math.min(val, caps.zoom.max));
                    await track.applyConstraints({ advanced: [{ zoom: target }] });
                } catch (e) { console.warn("Hardware zoom blocked."); }
            }
        }

        async function predict() {
            if (!isDetected && isReadyToAnalyze && webcam.readyState === 4) {
                const check = tf.tidy(() => {
                    const full = tf.browser.fromPixels(webcam);
                    const [h, w] = full.shape;
                    const baseZoomFactor = 0.42;
                    const adaptiveFactor = baseZoomFactor / currentZoomLevel; 
                    const roiW = w * adaptiveFactor; 
                    const roiH = roiW * (10/16);
                    const startY = (h - roiH) / 2;
                    const startX = (w - roiW) / 2;
                    const cropped = tf.image.cropAndResize(full.expandDims(0).toFloat(), [[startY/h, startX/w, (startY+roiH)/h, (startX+roiW)/w]], [0], [224, 224]);
                    const feat = model.infer(cropped.div(127.5).sub(1), true);
                    const sim = tf.sum(tf.mul(tf.div(targetFeatures, tf.norm(targetFeatures)), tf.div(feat, tf.norm(feat)))).dataSync()[0];
                    const cImg = cropped.squeeze();
                    let currentGrids = [];
                    for(let i=0; i<3; i++) for(let j=0; j<3; j++) currentGrids.push(cImg.slice([i*74, j*74, 0], [74, 74, 3]).mean().div(255).dataSync()[0]);
                    const brightness = currentGrids.reduce((a, b) => a + b) / 9;
                    let diffSum = 0;
                    for(let i=0; i<9; i++) diffSum += Math.abs(currentGrids[i] - targetGridData[i]);
                    const variance = currentGrids.reduce((a, b) => a + Math.pow(b - brightness, 2)) / 9;
                    return { sim, colorMatch: (diffSum / 9) < COLOR_MATCH_TOLERANCE, hasTexture: variance > VARIANCE_THRESHOLD, brightness };
                });

                if (check.brightness < BRIGHTNESS_THRESHOLD) {
                    updateStatus('สภาพแสงมืดเกินไป กรุณาเพิ่มความสว่าง', '#ff3b30');
                } else {
                    if (!check.hasTexture) updateStatus('กรุณาวางรูปถ่ายให้เข้าใกล้กรอบสแกน');
                    else if (check.sim < 0.75) updateStatus('ขยับรูปให้ตรงจุดกึ่งกลางของกรอบ');
                    else if (check.sim < THRESHOLD) updateStatus('เกือบแล้ว... ถือนิ่งๆ ไว้สักครู่');
                    else updateStatus('กำลังวิเคราะห์ความทรงจำ');
                }

                if (check.sim > THRESHOLD && check.colorMatch && check.hasTexture) {
                    detectionConfidence++;
                    lockIndicator.classList.add('scan-active');
                    if (detectionConfidence >= CONFIDENCE_REQUIRED) { triggerSuccess(); return; }
                } else {
                    detectionConfidence = 0; lockIndicator.classList.remove('scan-active');
                }
                setTimeout(() => requestAnimationFrame(predict), 100);
            } else if (!isDetected) requestAnimationFrame(predict);
        }

        function triggerSuccess() {
            isDetected = true;
            const flash = document.getElementById('success-flash');
            flash.style.opacity = '1';
            webcam.style.filter = 'blur(15px)';
            const frame = document.getElementById('scan-frame');
            frame.style.transform = 'translate(-50%, -50%) scale(0.8)';
            frame.style.opacity = '0';
            const zoomUI = document.getElementById('zoom-ui');
            if (zoomUI) zoomUI.style.display = 'none';

            setTimeout(() => {
                if (videoStream) videoStream.getTracks().forEach(t => t.stop());
                cameraContainer.style.display = 'none';
                flash.style.opacity = '0';
                videoContainer.classList.add('active');
                iframeTarget.innerHTML = `<iframe src="${PREVIEW_URL}" allow="autoplay; fullscreen" allowfullscreen></iframe>`;
            }, 400);
        }

        init();
    </script>
</body>
</html>
