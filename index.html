<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory 65</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Kanit', sans-serif; 
            background: #fff;
            color: #000;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* หน้าจอเริ่มต้น */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            text-align: center;
            transition: all 0.8s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .preview-box {
            position: relative;
            width: 100%;
            max-width: 280px;
            aspect-ratio: 16 / 9;
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.08);
            background: #fdfdfd;
        }

        .preview-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            opacity: 0.9;
            transition: transform 1.2s ease, filter 0.5s ease;
        }

        .preview-scan-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 2px;
            background: #000;
            z-index: 2;
            display: none;
            will-change: transform;
        }

        @keyframes scanDownOnce { 
            0% { transform: translateY(0); opacity: 1; } 
            100% { transform: translateY(157px); opacity: 1; } 
        }

        @keyframes flashEffect {
            0%, 100% { opacity: 0.9; filter: grayscale(1) brightness(1); }
            50% { opacity: 0.4; filter: grayscale(1) brightness(2); }
        }
        
        .analyzing .preview-scan-line { 
            display: block; 
            animation: scanDownOnce 1.2s forwards; 
        }
        
        .analyzing img { 
            filter: grayscale(1) brightness(0.95);
        }

        .flashing img {
            animation: flashEffect 0.2s infinite;
        }

        .btn-start {
            background: #000;
            color: #fff;
            border: none;
            width: auto;
            min-width: 160px;
            padding: 14px 28px;
            font-size: 0.9rem; 
            letter-spacing: 1px;
            border-radius: 100px;
            cursor: pointer;
            font-weight: 400;
            font-family: 'Kanit', sans-serif;
            transition: all 0.3s ease;
            white-space: nowrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .btn-start:disabled { background: #f0f0f0; color: #ccc; box-shadow: none; cursor: not-allowed; }
        .btn-start:active { transform: scale(0.95); }

        #camera-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; background: #fff;
        }

        #webcam { width: 100%; height: 100%; object-fit: cover; transition: filter 0.5s ease; }

        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 75vw; aspect-ratio: 16 / 10;
            max-width: 300px;
            border: 1.5px solid #000;
            border-radius: 8px;
            box-shadow: 0 0 0 2000px rgba(255,255,255,0.85);
            z-index: 5;
            transition: all 0.5s ease;
            overflow: hidden;
        }

        .scan-line {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 1px;
            background: #000;
            will-change: transform;
            animation: scanHardware 3s ease-in-out infinite;
        }

        @keyframes scanHardware { 
            0%, 100% { transform: translateY(10px); opacity: 0.2; } 
            50% { transform: translateY(170px); opacity: 0.8; } 
        }

        #flash-btn {
            position: absolute;
            top: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: rgba(255, 255, 255, 0.9);
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 100;
            border: 1px solid #000;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        #flash-btn.active { background: #000; color: #fff; }

        #success-flash {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            z-index: 3000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        #play-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.6s ease;
        }

        #video-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none; z-index: 1500;
            background: #000;
        }
        
        #video-player {
            width: 100%; height: 100%;
            object-fit: contain;
        }

        #fullscreen-hint {
            position: fixed;
            top: -100px; left: 50%;
            transform: translateX(-50%);
            background: #fff; color: #000;
            padding: 8px 20px; border-radius: 100px;
            font-size: 0.8rem; font-weight: 400;
            z-index: 3500; display: flex;
            align-items: center; gap: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border: 1px solid #000;
            transition: top 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #fullscreen-hint.show { top: 30px; }

        .status-msg {
            position: absolute;
            bottom: 12%; width: 100%;
            text-align: center; font-size: 0.9rem;
            color: #000; letter-spacing: 0.5px;
            font-weight: 400;
            z-index: 10;
            padding: 0 20px;
            transition: all 0.3s ease;
        }

        .status-sub-msg {
            display: block;
            font-size: 0.75rem;
            color: #888;
            margin-top: 4px;
            font-weight: 300;
        }

        .scan-indicator {
            position: absolute;
            top: 10px; right: 10px;
            width: 6px; height: 6px;
            border-radius: 50%;
            background: #eee;
            transition: background 0.2s;
        }
        .scan-active { background: #000 !important; }
        
        #error-fallback {
            display: none;
            margin-top: 15px;
            padding: 10px 20px;
            background: #ff3b30;
            color: white;
            border-radius: 50px;
            font-size: 0.8rem;
            text-decoration: none;
            font-weight: 400;
        }
    </style>
</head>
<body>

    <div id="success-flash"></div>

    <!-- หน้าจอหลัก -->
    <div id="overlay">
        <div class="preview-box" id="preview-container">
            <div class="preview-scan-line"></div>
            <img id="target-img" src="memory-picture.JPG">
        </div>
        <button class="btn-start" id="start-btn" disabled>กำลังรอ...</button>
    </div>

    <div id="fullscreen-hint">แตะวิดีโอเพื่อดูแบบเต็มจอ</div>

    <!-- ส่วนกล้อง -->
    <div id="camera-container">
        <div id="flash-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
        </div>
        <video id="webcam" autoplay playsinline></video>
        <div class="scan-frame" id="scan-frame">
            <div class="scan-indicator" id="lock-indicator"></div>
            <div class="scan-line"></div>
        </div>
        <div class="status-msg" id="status-display">
            ส่องไปที่รูปภาพความทรงจำ
            <span class="status-sub-msg" id="sub-status">กำลังเริ่มต้นระบบ...</span>
        </div>
    </div>

    <!-- หน้าจอพบความทรงจำ -->
    <div id="play-overlay">
        <div style="width:50px;height:50px;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:12px;">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span style="font-weight:400; font-size:0.95rem; letter-spacing:1px">พบความทรงจำแล้ว</span>
        <span style="font-size:0.75rem; opacity:0.4; margin-top:6px">แตะเพื่อเปิดรับชม</span>
        <a id="error-fallback" href="#">เปิดในเบราว์เซอร์ (หากวิดีโอไม่โหลด)</a>
    </div>

    <!-- Video Container -->
    <div id="video-container">
        <video id="video-player" playsinline loop controls muted crossorigin="anonymous"></video>
    </div>

    <script>
        const DRIVE_ID = "1myp5J_EBbO9jZJyTk-5kid2Qy5aBpRHQ";
        // ลิงก์ตรงสำหรับดาวน์โหลด (uc) และลิงก์สำหรับดูพรีวิว (view)
        const DIRECT_VIDEO_URL = `https://drive.google.com/uc?export=download&id=${DRIVE_ID}`;
        const PREVIEW_URL = `https://drive.google.com/file/d/${DRIVE_ID}/view`;

        const targetImg = document.getElementById('target-img');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const previewContainer = document.getElementById('preview-container');
        const cameraContainer = document.getElementById('camera-container');
        const webcam = document.getElementById('webcam');
        const videoContainer = document.getElementById('video-container');
        const videoPlayer = document.getElementById('video-player');
        const playOverlay = document.getElementById('play-overlay');
        const lockIndicator = document.getElementById('lock-indicator');
        const statusDisplay = document.getElementById('status-display');
        const subStatus = document.getElementById('sub-status');
        const flashBtn = document.getElementById('flash-btn');
        const fsHint = document.getElementById('fullscreen-hint');
        const successFlash = document.getElementById('success-flash');
        const errorFallback = document.getElementById('error-fallback');

        let model, targetFeatures, targetGridData;
        let isDetected = false;
        let isReadyToAnalyze = false;
        let videoStream = null;
        let isFlashOn = false;
        
        const THRESHOLD = 0.90; 
        const VARIANCE_THRESHOLD = 0.08; 
        const COLOR_MATCH_TOLERANCE = 0.18; 
        const BRIGHTNESS_THRESHOLD = 0.25; 
        let detectionConfidence = 0;
        const CONFIDENCE_REQUIRED = 10; 

        let dots = 0;
        const dotTimer = setInterval(() => {
            if (startBtn.disabled && startBtn.innerText.includes("กำลังรอ")) {
                dots = (dots + 1) % 4;
                startBtn.innerText = "กำลังรอ" + ".".repeat(dots);
            }
        }, 500);

        async function init() {
            try {
                if (!targetImg.complete) await new Promise(r => targetImg.onload = r);
                model = await mobilenet.load({ version: 2, alpha: 1.0 });
                
                const results = tf.tidy(() => {
                    const img = tf.browser.fromPixels(targetImg);
                    const feat = model.infer(tf.image.resizeBilinear(img, [224, 224]).expandDims(0).toFloat().div(127.5).sub(1), true);
                    const h = img.shape[0], w = img.shape[1];
                    const gridH = Math.floor(h/3), gridW = Math.floor(w/3);
                    let grids = [];
                    for(let i=0; i<3; i++){
                        for(let j=0; j<3; j++){
                            const slice = img.slice([i*gridH, j*gridW, 0], [gridH, gridW, 3]);
                            grids.push(slice.mean().div(255).dataSync()[0]);
                        }
                    }
                    return { feat, grids };
                });
                
                targetFeatures = results.feat;
                targetGridData = results.grids;
                
                startBtn.innerText = "เริ่มสัมผัสความทรงจำ";
                startBtn.disabled = false;
                clearInterval(dotTimer);
                
                // ตั้งค่าลิงก์สำรอง
                errorFallback.href = PREVIEW_URL;
            } catch (e) { startBtn.innerText = "เกิดข้อผิดพลาด"; }
        }

        // ตรวจสอบว่าวิดีโอโหลดได้หรือไม่
        videoPlayer.onerror = () => {
            console.error("Video failed to load.");
            errorFallback.style.display = 'block';
        };

        startBtn.onclick = () => {
            previewContainer.classList.add('analyzing');
            startBtn.disabled = true;
            
            setTimeout(() => {
                previewContainer.classList.add('flashing');
                
                setTimeout(() => {
                    overlay.style.opacity = '0';
                    setTimeout(async () => {
                        overlay.style.display = 'none';
                        cameraContainer.style.display = 'block';
                        try {
                            videoStream = await navigator.mediaDevices.getUserMedia({ 
                                video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } } 
                            });
                            webcam.srcObject = videoStream;
                            webcam.onloadedmetadata = () => {
                                videoPlayer.src = DIRECT_VIDEO_URL;
                                videoPlayer.load();
                                
                                const track = videoStream.getVideoTracks()[0];
                                const caps = track.getCapabilities();
                                if (caps.torch) flashBtn.style.display = 'flex';

                                setTimeout(() => {
                                    isReadyToAnalyze = true;
                                    requestAnimationFrame(predict);
                                }, 2000);
                            };
                        } catch (err) { subStatus.innerText = "ไม่สามารถเข้าถึงกล้องได้"; }
                    }, 500);
                }, 800); 
            }, 1200);
        };

        flashBtn.onclick = async () => {
            if (!videoStream) return;
            const track = videoStream.getVideoTracks()[0];
            try {
                isFlashOn = !isFlashOn;
                await track.applyConstraints({ advanced: [{ torch: isFlashOn }] });
                flashBtn.classList.toggle('active', isFlashOn);
            } catch (e) { console.error("Flash error:", e); }
        };

        async function predict() {
            if (!isDetected && isReadyToAnalyze && webcam.readyState === 4) {
                const check = tf.tidy(() => {
                    const full = tf.browser.fromPixels(webcam);
                    const [h, w] = full.shape;
                    
                    const roiW = w * 0.45;
                    const roiH = roiW * (10/16);
                    const startY = (h - roiH) / 2;
                    const startX = (w - roiW) / 2;
                    
                    const cropped = tf.image.cropAndResize(
                        full.expandDims(0).toFloat(), 
                        [[startY/h, startX/w, (startY+roiH)/h, (startX+roiW)/w]], 
                        [0], 
                        [224, 224]
                    );
                    
                    const feat = model.infer(cropped.div(127.5).sub(1), true);
                    const sim = tf.sum(tf.mul(tf.div(targetFeatures, tf.norm(targetFeatures)), tf.div(feat, tf.norm(feat)))).dataSync()[0];

                    const gridSide = 74; 
                    const cImg = cropped.squeeze();
                    let currentGrids = [];
                    for(let i=0; i<3; i++){
                        for(let j=0; j<3; j++){
                            const slice = cImg.slice([i*gridSide, j*gridSide, 0], [gridSide, gridSide, 3]);
                            currentGrids.push(slice.mean().div(255).dataSync()[0]);
                        }
                    }

                    const brightness = currentGrids.reduce((a, b) => a + b) / 9;
                    let diffSum = 0;
                    let mean = currentGrids.reduce((a, b) => a + b) / 9;
                    let variance = currentGrids.reduce((a, b) => a + Math.pow(b - mean, 2)) / 9;
                    for(let i=0; i<9; i++) diffSum += Math.abs(currentGrids[i] - targetGridData[i]);
                    
                    const colorMatch = (diffSum / 9) < COLOR_MATCH_TOLERANCE;
                    const hasTexture = variance > VARIANCE_THRESHOLD; 

                    return { sim, colorMatch, hasTexture, brightness };
                });

                if (check.brightness < BRIGHTNESS_THRESHOLD) {
                    subStatus.innerText = "สภาพแสงมืดเกินไป กรุณาเพิ่มความสว่าง";
                    subStatus.style.color = "#ff3b30";
                } else if (!check.hasTexture) {
                    subStatus.innerText = "กรุณาวางรูปถ่ายให้เข้าใกล้กรอบสแกน";
                    subStatus.style.color = "#888";
                } else if (check.sim < 0.7) {
                    subStatus.innerText = "ขยับรูปให้ตรงจุดกึ่งกลางของกรอบ";
                    subStatus.style.color = "#888";
                } else if (check.sim < THRESHOLD || !check.colorMatch) {
                    subStatus.innerText = "เกือบแล้ว... ถือนิ่งๆ ไว้สักครู่";
                    subStatus.style.color = "#000";
                } else {
                    subStatus.innerText = "กำลังวิเคราะห์ความทรงจำ...";
                    subStatus.style.color = "#000";
                }

                if (check.sim > THRESHOLD && check.colorMatch && check.hasTexture) {
                    detectionConfidence++;
                    lockIndicator.classList.add('scan-active');
                    if (detectionConfidence >= CONFIDENCE_REQUIRED) {
                        triggerSuccess();
                        return;
                    }
                } else {
                    detectionConfidence = 0;
                    lockIndicator.classList.remove('scan-active');
                }
                setTimeout(() => requestAnimationFrame(predict), 100);
            } else if (!isDetected) requestAnimationFrame(predict);
        }

        function triggerSuccess() {
            isDetected = true;
            successFlash.style.opacity = '1';
            webcam.style.filter = 'blur(15px)';
            const frame = document.getElementById('scan-frame');
            frame.style.transform = 'translate(-50%, -50%) scale(0.8)';
            frame.style.opacity = '0';
            subStatus.innerText = "ปลดล็อกความทรงจำสำเร็จ";

            setTimeout(() => {
                if (videoStream) videoStream.getTracks().forEach(t => t.stop());
                cameraContainer.style.display = 'none';
                successFlash.style.opacity = '0';
                
                playOverlay.style.display = 'flex';
                setTimeout(() => playOverlay.style.opacity = '1', 50);
            }, 400);
        }

        playOverlay.onclick = (e) => {
            // หากกดปุ่มสีแดง (Fallback) ให้ทำงานตามลิงก์
            if (e.target.id === 'error-fallback') return;

            playOverlay.style.opacity = '0';
            setTimeout(() => {
                playOverlay.style.display = 'none';
                videoContainer.style.display = 'block';
                
                // พยายามเล่นวิดีโอ (ปิดเสียงก่อนเพื่อให้เล่นได้ชัวร์)
                videoPlayer.muted = true;
                const playPromise = videoPlayer.play();

                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        // เล่นได้สำเร็จ ค่อยเปิดเสียง (หากเบราว์เซอร์ยอม)
                        videoPlayer.muted = false;
                    }).catch(error => {
                        console.log("Auto-play blocked or link error. Redirecting...");
                        // ถ้าเล่นไม่ได้เลย ให้เด้งไปที่ Google Drive Preview ทันที
                        window.location.href = PREVIEW_URL;
                    });
                }

                setTimeout(() => {
                    fsHint.classList.add('show');
                    setTimeout(() => fsHint.classList.remove('show'), 5000);
                }, 3000);
            }, 400);
        };

        init();
    </script>
</body>
</html>
