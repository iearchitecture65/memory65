<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Lens - NFT Edition</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- A-Frame & AR.js for NFT -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar-nft.js"></script>
    
    <style>
        :root {
            --bg-gradient: linear-gradient(180deg, #0f172a 0%, #000000 100%);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Sarabun', sans-serif; 
            background: #000;
            color: #fff;
        }
        
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 320px;
            text-align: center;
        }

        h1 {
            font-weight: 300;
            letter-spacing: 4px;
            margin-bottom: 10px;
            text-transform: uppercase;
            font-size: 1.4rem;
        }

        .image-preview {
            width: 180px;
            height: 180px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            border-radius: 50%;
            margin: 0 auto 40px;
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .image-preview img { 
            width: 90%; 
            height: 90%; 
            object-fit: contain;
            border-radius: 50%;
        }

        .btn-start {
            background: white;
            color: black;
            border: none;
            padding: 16px 50px;
            font-size: 0.9rem;
            letter-spacing: 2px;
            border-radius: 100px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: 600;
        }

        #ui-layer {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 100;
            display: none;
        }

        .scan-msg {
            position: absolute;
            bottom: 60px;
            width: 100%;
            text-align: center;
            font-size: 0.8rem;
            letter-spacing: 1px;
            opacity: 0.8;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }

        .arjs-loader {
            height: 100%; width: 100%;
            position: absolute; top: 0; left: 0;
            background-color: rgba(0, 0, 0, 0.9);
            z-index: 9998;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            padding: 20px;
        }

        a-scene { display: none; }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="container">
            <h1>Memory Lens</h1>
            <p style="font-weight: 300; font-size: 0.85rem; opacity: 0.7; margin-bottom: 30px;">
                สแกนรูปน้องแมวเพื่อดูวิดีโอ
            </p>
            <div class="image-preview">
                <img src="pepsiontime.png" alt="Target">
            </div>
            <button class="btn-start" id="btnStart">เริ่มสแกน</button>
        </div>
    </div>

    <div id="ui-layer">
        <div class="scan-msg" id="scanMsg">🔍 กำลังรอสแกนรูป...</div>
    </div>

    <div class="arjs-loader" id="loader" style="display: none;">
        <div>กำลังเตรียมความทรงจำ...</div>
    </div>

    <a-scene 
        vr-mode-ui="enabled: false;"
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        embedded
        arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <video id="v" 
                   src="D_Logo_Reveal_for_Performing_Arts.mp4" 
                   preload="auto" 
                   loop="true" 
                   crossorigin="anonymous" 
                   playsinline 
                   webkit-playsinline
                   muted>
            </video>
        </a-assets>

        <!-- แก้ไข URL ให้ตรงกับไฟล์ในโฟลเดอร์ descriptors ของคุณ -->
        <a-nft
            type="nft"
            url="./descriptors/pepsiontime"
            smooth="true"
            smoothCount="10"
            smoothTolerance=".01"
            smoothThreshold="5">
            
            <!-- ปรับขนาดวิดีโอให้พอดี (NFT ใช้หน่วยพิกเซล) -->
            <a-video 
                src="#v" 
                width="160" 
                height="90" 
                position="80 0 -80" 
                rotation="-90 0 0">
            </a-video>
        </a-nft>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        const btn = document.getElementById('btnStart');
        const overlay = document.getElementById('overlay');
        const scene = document.querySelector('a-scene');
        const uiLayer = document.getElementById('ui-layer');
        const video = document.getElementById('v');
        const scanMsg = document.getElementById('scanMsg');
        const loader = document.getElementById('loader');

        btn.addEventListener('click', async () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                scene.style.display = 'block';
                uiLayer.style.display = 'block';
                loader.style.display = 'flex';
            }, 800);

            try {
                video.load();
                await video.play();
                video.pause();
            } catch (e) { console.log("Unlock Ready"); }
        });

        // เมื่อระบบ NFT โหลดไฟล์จาก descriptors สำเร็จ
        window.addEventListener('arjs-nft-loaded', () => {
            loader.style.display = 'none';
            console.log("NFT Loaded!");
        });

        const nftMarker = document.querySelector('a-nft');
        nftMarker.addEventListener('markerFound', () => {
            scanMsg.innerText = "🎬 กำลังเล่นวิดีโอ...";
            video.muted = false;
            video.play();
        });

        nftMarker.addEventListener('markerLost', () => {
            scanMsg.innerText = "🔍 สแกนที่รูปน้องแมว...";
            video.pause();
        });
    </script>
</body>
</html>
