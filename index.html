<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Lens - Mobile Scanner</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    
    <!-- TensorFlow.js & MobileNet for Image Similarity -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        :root {
            --accent-color: #ffffff;
            --bg-gradient: linear-gradient(180deg, #121212 0%, #000000 100%);
        }

        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Sarabun', sans-serif; 
            background: #000;
            color: #fff;
            -webkit-tap-highlight-color: transparent;
        }
        
        /* หน้าจอเริ่มต้น */
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-gradient);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .container { width: 100%; max-width: 400px; }
        h1 { font-weight: 300; letter-spacing: 6px; text-transform: uppercase; font-size: 1.8rem; margin-bottom: 5px; }
        p { font-weight: 300; font-size: 1rem; opacity: 0.6; margin-bottom: 40px; }

        .image-preview {
            width: 220px; height: 220px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
            margin: 0 auto 40px;
            padding: 10px;
            border: 2px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-shadow: 0 0 30px rgba(255,255,255,0.05);
        }
        
        .image-preview img { 
            width: 100%; height: 100%; 
            object-fit: contain; 
            border-radius: 50%;
            transition: transform 0.3s ease;
        }

        .btn-start {
            background: white; color: black; border: none;
            width: 80%;
            max-width: 250px;
            padding: 18px 0; font-size: 1rem; letter-spacing: 3px;
            border-radius: 100px; cursor: pointer; font-weight: 600;
            text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(255,255,255,0.1);
            transition: transform 0.2s, background 0.2s;
        }
        .btn-start:active { transform: scale(0.95); }
        .btn-start:disabled { background: #333; color: #666; cursor: not-allowed; box-shadow: none; }

        /* ระบบนับถอยหลัง */
        #countdown {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: none;
            justify-content: center;
            align-items: center;
            font-size: 8rem;
            font-weight: 600;
            z-index: 2000;
            letter-spacing: -5px;
        }

        /* ส่วนแสดงผลกล้องและวิดีโอ */
        #camera-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
        }

        #webcam {
            width: 100%; height: 100%; object-fit: cover;
        }

        #video-player {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 90vw;
            max-width: 600px;
            border-radius: 20px;
            display: none;
            box-shadow: 0 0 100px rgba(255,255,255,0.3);
            z-index: 10;
        }

        #scan-ui {
            position: absolute;
            bottom: 50px; width: 100%;
            text-align: center; pointer-events: none;
            z-index: 5;
        }

        .status-badge {
            background: rgba(0,0,0,0.8);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            letter-spacing: 1px;
            border: 1px solid rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
        }

        .loader-ring {
            width: 30px; height: 30px;
            border: 2px solid rgba(255,255,255,0.1);
            border-top: 2px solid #fff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 15px;
        }

        /* ตัวแสดงคะแนนความเหมือน (สำหรับ Debug - ซ่อนไว้ถ้าไม่ต้องการ) */
        #debug-score {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 10px;
            opacity: 0.3;
            pointer-events: none;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="container">
            <h1>Memory Lens</h1>
            <p id="main-desc">รอสักครู่ ระบบกำลังเตรียมตัว...</p>
            <div class="image-preview">
                <img id="target-img" src="pepsiontime.png" alt="Memory Target">
            </div>
            <button class="btn-start" id="start-btn" disabled>กำลังโหลด...</button>
        </div>
    </div>

    <div id="countdown">3</div>

    <div id="camera-container">
        <div id="debug-score"></div>
        <video id="webcam" autoplay playsinline></video>
        <video id="video-player" src="D_Logo_Reveal_for_Performing_Arts.mp4" playsinline loop></video>

        <div id="scan-ui">
            <div class="loader-ring" id="ui-loader"></div>
            <span class="status-badge" id="status-text">🔍 ส่องไปที่พวงกุญแจของคุณ</span>
        </div>
    </div>

    <script>
        const targetImg = document.getElementById('target-img');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const countdownEl = document.getElementById('countdown');
        const mainDesc = document.getElementById('main-desc');
        const cameraContainer = document.getElementById('camera-container');
        const webcam = document.getElementById('webcam');
        const videoPlayer = document.getElementById('video-player');
        const statusText = document.getElementById('status-text');
        const uiLoader = document.getElementById('ui-loader');
        const debugScore = document.getElementById('debug-score');

        let model;
        let targetFeatures;
        let isVideoPlaying = false;
        
        // ปรับลด Threshold ลงเพื่อให้สแกนติดง่ายขึ้นในสภาวะแสงจริง
        // 0.60 เป็นค่าที่สมดุลระหว่างความแม่นยำและการสแกนติดง่าย
        const SIMILARITY_THRESHOLD = 0.60; 

        function waitForImage(img) {
            return new Promise((resolve, reject) => {
                if (img.complete && img.naturalWidth !== 0) resolve();
                else {
                    img.onload = () => resolve();
                    img.onerror = () => reject(new Error("หาไฟล์รูปภาพเป้าหมายไม่พบ"));
                }
            });
        }

        async function init() {
            try {
                await waitForImage(targetImg);
                model = await mobilenet.load();
                
                const targetTensor = tf.browser.fromPixels(targetImg);
                targetFeatures = model.infer(targetTensor, true);
                targetTensor.dispose();
                
                mainDesc.innerText = "ระบบพร้อมสแกนความทรงจำ";
                startBtn.innerText = "เริ่มสแกน";
                startBtn.disabled = false;
            } catch (e) {
                mainDesc.innerText = "❌ เกิดข้อผิดพลาดในการโหลดระบบ AI";
                console.error(e);
            }
        }

        async function startWithCountdown() {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 500);

            countdownEl.style.display = 'flex';
            for (let i = 3; i > 0; i--) {
                countdownEl.innerText = i;
                await new Promise(r => setTimeout(r, 800));
            }
            countdownEl.style.display = 'none';
            openCamera();
        }

        async function openCamera() {
            cameraContainer.style.display = 'block';
            try {
                // เพิ่มความละเอียด ideal เพื่อให้ AI เห็นภาพชัดขึ้น
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", width: { ideal: 1280 }, height: { ideal: 720 } }, 
                    audio: false 
                });
                webcam.srcObject = stream;
                videoPlayer.load();
                
                // เริ่มระบบตรวจจับทันที
                requestAnimationFrame(predictLoop);
            } catch (err) {
                alert("ไม่สามารถเข้าถึงกล้องได้: " + err.message);
            }
        }

        startBtn.addEventListener('click', startWithCountdown);

        async function predictLoop() {
            if (!isVideoPlaying && model) {
                try {
                    const similarity = tf.tidy(() => {
                        const webcamTensor = tf.browser.fromPixels(webcam);
                        const webcamFeatures = model.infer(webcamTensor, true);
                        
                        const a = tf.div(targetFeatures, tf.norm(targetFeatures));
                        const b = tf.div(webcamFeatures, tf.norm(webcamFeatures));
                        return tf.sum(tf.mul(a, b)).dataSync()[0];
                    });

                    // แสดงคะแนนสำหรับการทดสอบ (Debug)
                    debugScore.innerText = "Score: " + similarity.toFixed(2);

                    if (similarity > SIMILARITY_THRESHOLD) {
                        showVideo();
                        return;
                    }
                } catch (e) {
                    console.warn("Frame skipped:", e);
                }
            }
            
            // ปรับเวลาให้ถี่ขึ้น (100ms) เพื่อให้สแกนติดไวขึ้น
            setTimeout(() => requestAnimationFrame(predictLoop), 100);
        }

        function showVideo() {
            isVideoPlaying = true;
            uiLoader.style.display = 'none';
            statusText.innerText = "✨ พบความทรงจำแล้ว!";
            statusText.style.background = "rgba(46, 204, 113, 0.8)";
            
            videoPlayer.style.display = 'block';
            videoPlayer.play().catch(err => {
                console.error("Play failed:", err);
                statusText.innerText = "⚠️ กรุณาแตะที่หน้าจอเพื่อเล่นวิดีโอ";
            });
            
            videoPlayer.onclick = () => {
                videoPlayer.pause();
                videoPlayer.style.display = 'none';
                isVideoPlaying = false;
                uiLoader.style.display = 'block';
                statusText.innerText = "🔍 ส่องไปที่พวงกุญแจของคุณ";
                statusText.style.background = "rgba(0,0,0,0.8)";
                requestAnimationFrame(predictLoop);
            };
        }

        init();
    </script>
</body>
</html>
