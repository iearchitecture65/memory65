<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Memory Lens</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/mobilenet"></script>
    
    <style>
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            overflow: hidden; 
            font-family: 'Kanit', sans-serif; 
            background: #fff;
            color: #000;
            -webkit-tap-highlight-color: transparent;
        }
        
        #overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            transition: opacity 0.5s ease, transform 0.5s ease;
            padding: 20px;
        }

        .preview-box {
            position: relative;
            width: 100%;
            max-width: 320px;
            aspect-ratio: 16 / 9;
            margin-bottom: 30px;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(0,0,0,0.1);
            background: #f9f9f9;
            transition: all 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .preview-box img { 
            width: 100%; height: 100%; 
            object-fit: cover; 
            opacity: 0.9;
            transition: transform 0.8s ease, filter 0.8s ease;
        }

        .preview-scan-line {
            position: absolute;
            top: -100%; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.2), transparent);
            border-bottom: 2px solid #000;
            z-index: 2;
            display: none;
        }

        @keyframes scanning {
            0% { top: -100%; }
            100% { top: 100%; }
        }

        .analyzing .preview-scan-line {
            display: block;
            animation: scanning 1.5s linear infinite;
        }
        .analyzing img {
            transform: scale(1.1);
            filter: grayscale(1) contrast(1.2);
        }

        .btn-start {
            background: #000; color: #fff; border: none;
            width: 90%;
            max-width: 280px;
            padding: 16px 0; 
            font-size: 1.05rem; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 600;
            font-family: 'Kanit', sans-serif;
            white-space: nowrap;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        
        .btn-start:disabled { background: #eee; color: #aaa; cursor: wait; }
        .btn-start:active { transform: scale(0.95); }

        #camera-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            background: #fff;
        }

        #webcam { width: 100%; height: 100%; object-fit: cover; }

        .scan-frame {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw; 
            aspect-ratio: 16 / 10;
            max-width: 340px;
            border: 2px solid #000;
            border-radius: 12px;
            box-shadow: 0 0 0 2000px rgba(255,255,255,0.7);
            z-index: 5;
        }

        .scan-line {
            position: absolute;
            top: 0; width: 100%; height: 2px;
            background: #000;
            box-shadow: 0 0 8px rgba(0,0,0,0.3);
            animation: scan 2.5s ease-in-out infinite;
        }

        @keyframes scan { 0%, 100% { top: 5%; } 50% { top: 95%; } }

        #play-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.98);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            cursor: pointer;
            color: #000;
            padding: 20px;
        }

        #video-player {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            z-index: 1500;
            object-fit: contain;
            background: #000;
        }

        #fullscreen-hint {
            position: fixed;
            top: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: #fff;
            color: #000;
            padding: 10px 24px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            z-index: 3000;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
            border: 1.5px solid #000;
            cursor: pointer;
            white-space: nowrap;
            transition: top 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #fullscreen-hint.show { top: 30px; }

        .status-msg {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            font-size: 0.85rem;
            color: #000;
            letter-spacing: 0.5px;
            z-index: 10;
            white-space: nowrap;
        }

        .scan-indicator {
            position: absolute;
            top: 10px; right: 10px;
            width: 10px; height: 10px;
            border-radius: 50%;
            background: #eee;
            transition: background 0.2s;
        }
        .scan-active { background: #000 !important; box-shadow: 0 0 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="preview-box" id="preview-container">
            <div class="preview-scan-line"></div>
            <img id="target-img" src="memory-picture.JPG">
        </div>
        <button class="btn-start" id="start-btn" disabled>กำลังรอ</button>
    </div>

    <div id="fullscreen-hint">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        ดูแบบเต็มจอ
    </div>

    <div id="camera-container">
        <video id="webcam" autoplay playsinline></video>
        <div class="scan-frame">
            <div class="scan-indicator" id="lock-indicator"></div>
            <div class="scan-line"></div>
        </div>
        <div class="status-msg" id="status-display">กำลังเตรียมเลนส์...</div>
    </div>

    <div id="play-overlay">
        <div style="width:56px;height:56px;background:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;margin-bottom:12px">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="#fff"><path d="M8 5v14l11-7z"/></svg>
        </div>
        <span style="letter-spacing:0.5px; font-size:1rem; font-weight:600; white-space:nowrap;">พบความทรงจำแล้ว</span>
    </div>

    <video id="video-player" src="Video.mp4" playsinline loop controls></video>

    <script>
        const targetImg = document.getElementById('target-img');
        const startBtn = document.getElementById('start-btn');
        const overlay = document.getElementById('overlay');
        const previewContainer = document.getElementById('preview-container');
        const cameraContainer = document.getElementById('camera-container');
        const webcam = document.getElementById('webcam');
        const videoPlayer = document.getElementById('video-player');
        const playOverlay = document.getElementById('play-overlay');
        const fsHint = document.getElementById('fullscreen-hint');
        const statusDisplay = document.getElementById('status-display');
        const lockIndicator = document.getElementById('lock-indicator');

        let model, targetFeatures;
        let isDetected = false;
        let isReadyToAnalyze = false;
        
        // เพิ่มความเข้มงวดสูงสุดเพื่อป้องกันการตรวจจับผิดพลาด
        const THRESHOLD = 0.85; 
        let detectionConfidence = 0;
        const CONFIDENCE_REQUIRED = 25; // ต้องการการยืนยันที่ยาวนานและนิ่งขึ้น

        async function init() {
            try {
                if (!targetImg.complete) await new Promise(r => targetImg.onload = r);
                model = await mobilenet.load({ version: 2, alpha: 1.0 });
                
                const targetTensor = tf.tidy(() => {
                    const img = tf.browser.fromPixels(targetImg);
                    return tf.image.resizeBilinear(img, [224, 224]).expandDims(0).toFloat().div(127.5).sub(1);
                });
                
                targetFeatures = model.infer(targetTensor, true);
                targetTensor.dispose();
                
                startBtn.innerText = "เริ่มสแกนความทรงจำ";
                startBtn.disabled = false;
            } catch (e) { startBtn.innerText = "โหลดไม่สำเร็จ"; }
        }

        startBtn.onclick = () => {
            previewContainer.classList.add('analyzing');
            startBtn.innerText = "กำลังประมวลผล...";
            startBtn.disabled = true;

            setTimeout(() => {
                overlay.style.opacity = '0';
                overlay.style.transform = 'scale(1.1)';
                
                setTimeout(async () => {
                    overlay.style.display = 'none';
                    cameraContainer.style.display = 'block';
                    try {
                        const stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { 
                                facingMode: "environment", 
                                width: { ideal: 1280 }, 
                                height: { ideal: 720 },
                                zoom: 1.2
                            }, 
                            audio: false 
                        });
                        
                        webcam.srcObject = stream;
                        
                        const track = stream.getVideoTracks()[0];
                        const capabilities = track.getCapabilities();
                        
                        if (capabilities.zoom) {
                            track.applyConstraints({
                                advanced: [{ zoom: Math.min(capabilities.zoom.max, 1.3) }]
                            }).catch(() => {});
                        }
                        
                        webcam.onloadedmetadata = () => {
                            videoPlayer.load();
                            // เพิ่มระยะเวลารอคอยเพื่อให้เลนส์กล้องนิ่งจริงๆ
                            setTimeout(() => {
                                isReadyToAnalyze = true;
                                statusDisplay.innerText = "วางรูปถ่ายให้พอดีกับกรอบ";
                                requestAnimationFrame(predict);
                            }, 3000);
                        };
                    } catch (err) {
                        statusDisplay.innerText = "ไม่สามารถเข้าถึงกล้องได้";
                    }
                }, 500);
            }, 1200);
        };

        async function predict() {
            if (!isDetected && isReadyToAnalyze && webcam.readyState === 4) {
                const score = tf.tidy(() => {
                    const fullImg = tf.browser.fromPixels(webcam);
                    const [h, w] = fullImg.shape;
                    
                    // บีบพื้นที่ ROI ให้เล็กลงเพื่อความแม่นยำสูง
                    const size = Math.min(h, w) * 0.5;
                    const startH = (h - size) / 2;
                    const startW = (w - size) / 2;
                    
                    const croppedImg = tf.image.cropAndResize(
                        fullImg.expandDims(0).toFloat(),
                        [[startH/h, startW/w, (startH+size)/h, (startW+size)/w]],
                        [0],
                        [224, 224]
                    ).div(127.5).sub(1);

                    const feat = model.infer(croppedImg, true);
                    const a = tf.div(targetFeatures, tf.norm(targetFeatures));
                    const b = tf.div(feat, tf.norm(feat));
                    return tf.sum(tf.mul(a, b)).dataSync()[0];
                });

                if (score > THRESHOLD) {
                    detectionConfidence++;
                    lockIndicator.classList.add('scan-active');
                    
                    if (detectionConfidence >= CONFIDENCE_REQUIRED) {
                        isDetected = true;
                        if (webcam.srcObject) {
                            webcam.srcObject.getTracks().forEach(t => t.stop());
                        }
                        cameraContainer.style.display = 'none';
                        videoPlayer.style.display = 'block';
                        playOverlay.style.display = 'flex';
                        return;
                    }
                } else {
                    // หากคะแนนตกลงแม้เพียงนิดเดียว ให้รีเซ็ตคะแนนสะสมเป็น 0 ทันที
                    detectionConfidence = 0;
                    lockIndicator.classList.remove('scan-active');
                }
                
                setTimeout(() => requestAnimationFrame(predict), 80);
            } else if (!isDetected) {
                requestAnimationFrame(predict);
            }
        }

        playOverlay.onclick = () => {
            playOverlay.style.display = 'none';
            videoPlayer.play();

            setTimeout(() => {
                const isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
                if (!isFS) {
                    fsHint.classList.add('show');
                    setTimeout(() => fsHint.classList.remove('show'), 6000);
                }
            }, 2000);
        };

        fsHint.onclick = () => {
            const el = videoPlayer;
            if (el.requestFullscreen) el.requestFullscreen();
            else if (el.webkitEnterFullscreen) el.webkitEnterFullscreen();
            else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
            fsHint.classList.remove('show');
        };

        const onFSChange = () => {
            const isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement;
            if (isFS) fsHint.classList.remove('show');
        };
        document.addEventListener('fullscreenchange', onFSChange);
        document.addEventListener('webkitfullscreenchange', onFSChange);

        init();
    </script>
</body>
</html>
